<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عجلة الحظ 🎡 | Games1area</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#ffd700; --main:#0f0; --bg:#090909; --card:#151515; }
    body { margin:0; font-family:'Cairo',sans-serif; background:var(--bg); color:#fff; text-align:center; padding:16px; }
    .top { display:flex; justify-content:space-between; align-items:center; max-width:1100px; margin:0 auto 16px; gap:10px; }
    .btn { background:#1d1d1d; color:#fff; border:1px solid #444; border-radius:10px; padding:10px 14px; cursor:pointer; font-weight:900; text-decoration:none; }
    .stats { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .pill { background:#141414; border:1px solid #333; border-radius:999px; padding:8px 14px; }
    .wrap { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .card { background:var(--card); border:1px solid #2b2b2b; border-radius:16px; padding:14px; }
    .wheel { width:290px; height:290px; margin:10px auto; border-radius:50%; border:8px solid var(--gold); position:relative; overflow:hidden; transition: transform 4s cubic-bezier(.17,.67,.12,.99); background:#222; }
    .pointer { width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:22px solid var(--gold); margin:0 auto 8px; }
    .seglabel { position:absolute; left:50%; top:50%; transform-origin:0 0; font-size:.72rem; font-weight:900; color:#fff; text-shadow:0 1px 2px #000; background:rgba(0,0,0,.32); padding:2px 5px; border-radius:999px; border:1px solid rgba(255,255,255,.2); white-space:nowrap; line-height:1; } 
    .prizes { text-align:right; margin-top:10px; font-size:.9rem; background:#101010; border:1px solid #2d2d2d; border-radius:12px; padding:8px; }
    .prize-row { display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center; border-bottom:1px dashed #333; padding:8px 0; }
    .swatch { width:14px; height:14px; border-radius:4px; display:inline-block; border:1px solid rgba(255,255,255,.4); }
    .prize-txt { display:flex; gap:6px; align-items:center; }
    .prob { color:var(--gold); font-weight:900; }
    .spin-btn { background:var(--gold); color:#000; border:none; border-radius:10px; padding:10px 16px; font-weight:900; cursor:pointer; }
    .spin-btn:disabled { opacity:.5; cursor:not-allowed; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:12px 20px; border-radius:999px; border:2px solid var(--gold); display:none; z-index:9999; }
    @media (max-width:900px){ .wrap{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="top">
    <a href="index.html" class="btn">⬅️ العودة للساحة</a>
    <div class="stats">
      <div class="pill">💰 جولد: <span id="gold">0</span></div>
      <div class="pill">🎡 لفات لودو: <span id="ludo-spins">0</span></div>
    </div>
  </div>

  <div class="wrap">
    <section class="card">
      <h2>قسم أبطال لودو (لفة مجانية)</h2>
      <p style="color:#aaa">الجائزة داخل العجلة + قائمة احتمالات مفصلة بالألوان.</p>
      <div class="pointer"></div>
      <div id="wheel-free" class="wheel"></div>
      <button id="spin-free-btn" class="spin-btn" onclick="spin('free')">لف مجانًا 🎯</button>
      <div class="prizes" id="free-list"></div>
    </section>

    <section class="card">
      <h2>قسم النخبة (250 جولد)</h2>
      <p style="color:#aaa">جوائز قوية مع قائمة احتمالات تفصيلية بنفس ألوان العجلة.</p>
      <div class="pointer"></div>
      <div id="wheel-paid" class="wheel"></div>
      <button id="spin-paid-btn" class="spin-btn" onclick="spin('paid')">لف بـ 250 جولد 💸</button>
      <div class="prizes" id="paid-list"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const firebaseConfig = { databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mID = localStorage.getItem('arena_user_id');
    if (!mID) { alert('ادخل الساحة أولاً'); location.href = 'index.html'; }
    const uRef = db.ref(`users/${mID}`);

    let userState = { gold: 0, ludoSpins: 0, skills: {} };

    const freePrizes = [
      { key:'gold_120', icon:'💰', label:'120 جولد', type:'gold', amount:120, chance:40, color:'#2e7d32' },
      { key:'spy_1', icon:'👁️', label:'رادار x1', type:'skill', skill:'spy', amount:1, chance:24, color:'#8e24aa' },
      { key:'skip_1', icon:'🏃', label:'هروب x1', type:'skill', skill:'skip', amount:1, chance:15, color:'#1565c0' },
      { key:'erase_1', icon:'🧽', label:'ممحاة x1', type:'skill', skill:'erase', amount:1, chance:12, color:'#6d4c41' },
      { key:'gold_300', icon:'💎', label:'300 جولد', type:'gold', amount:300, chance:7, color:'#f9a825' },
      { key:'freeze_1', icon:'❄️', label:'تجميد x1', type:'skill', skill:'freeze', amount:1, chance:2, color:'#0097a7' }
    ];

    const paidPrizes = [
      { key:'gold_220', icon:'💰', label:'220 جولد', type:'gold', amount:220, chance:30, color:'#2e7d32' },
      { key:'gold_450', icon:'💎', label:'450 جولد', type:'gold', amount:450, chance:18, color:'#f9a825' },
      { key:'spy_2', icon:'👁️', label:'رادار x2', type:'skill', skill:'spy', amount:2, chance:14, color:'#8e24aa' },
      { key:'skip_2', icon:'🏃', label:'هروب x2', type:'skill', skill:'skip', amount:2, chance:14, color:'#1565c0' },
      { key:'erase_2', icon:'🧽', label:'ممحاة x2', type:'skill', skill:'erase', amount:2, chance:12, color:'#6d4c41' },
      { key:'freeze_2', icon:'❄️', label:'تجميد x2', type:'skill', skill:'freeze', amount:2, chance:8, color:'#0097a7' },
      { key:'jackpot', icon:'🏆', label:'جاكبوت 1000 جولد', type:'gold', amount:1000, chance:4, color:'#c62828' }
    ];

    function toast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2800); }

    function renderWheel(elId, prizes) {
      const wheel = document.getElementById(elId);
      wheel.innerHTML = '';
      const total = prizes.reduce((a,p)=>a+p.chance,0);
      let start = 0;
      prizes.forEach((p, idx) => {
        const deg = (p.chance / total) * 360;
        const seg = document.createElement('div');
        seg.style.position='absolute'; seg.style.inset='0';
        seg.style.background = `conic-gradient(from ${start}deg, ${p.color} 0 ${deg}deg, transparent ${deg}deg 360deg)`;
        seg.style.mixBlendMode = idx % 2 ? 'screen' : 'normal';
        wheel.appendChild(seg);

        const mid = start + deg/2;
        // منع تداخل النصوص: القطاعات الصغيرة لا نضع لها نص كامل داخل العجلة
        if (deg >= 10) {
          const lbl = document.createElement('div');
          lbl.className = 'seglabel';
          const radius = deg < 18 ? 86 : 98;
          lbl.style.transform = `rotate(${mid}deg) translate(${radius}px, -9px) rotate(${-mid}deg)`;
          lbl.innerText = deg < 18 ? `${p.icon || '🎁'}` : `${p.icon || '🎁'} ${p.chance}%`;
          wheel.appendChild(lbl);
        }
        start += deg;
      });
    }

    function renderList(elId, prizes) {
      const el = document.getElementById(elId);
      el.innerHTML = prizes.map(p => `
        <div class="prize-row">
          <span class="swatch" style="background:${p.color}"></span>
          <span class="prize-txt">${p.icon || '🎁'} <span>${p.label}</span></span>
          <span class="prob">${p.chance}%</span>
        </div>
      `).join('');
    }

    function weightedPick(prizes){
      const rand = Math.random()*100;
      let acc = 0;
      for(const p of prizes){ acc += p.chance; if(rand <= acc) return p; }
      return prizes[prizes.length-1];
    }

    function calcTargetRotation(prizes, prize){
      const total = prizes.reduce((a,p)=>a+p.chance,0);
      let start = 0;
      for(const p of prizes){
        const deg=(p.chance/total)*360;
        if(p.key===prize.key){
          const mid = start + deg/2;
          return 360*6 + (360-mid);
        }
        start += deg;
      }
      return 360*6;
    }

    function applyPrize(user, prize){
      if(prize.type==='gold') user.gold=(user.gold||0)+prize.amount;
      if(prize.type==='skill'){
        if(!user.skills) user.skills={};
        user.skills[prize.skill]=(user.skills[prize.skill]||0)+prize.amount;
      }
      return `ربحت: ${prize.label} 🎉`;
    }

    function spin(type){
      const isFree = type==='free';
      const prizes = isFree ? freePrizes : paidPrizes;
      const wheel = document.getElementById(isFree ? 'wheel-free' : 'wheel-paid');
      const btn = document.getElementById(isFree ? 'spin-free-btn' : 'spin-paid-btn');
      btn.disabled = true;

      const chosen = weightedPick(prizes);
      const rot = calcTargetRotation(prizes, chosen);
      wheel.style.transform = `rotate(${rot}deg)`;

      setTimeout(()=>{
        uRef.transaction(user => {
          if(!user) return;
          user.skills = user.skills || {};
          if(isFree){
            if((user.ludoSpins||0) < 1) return user;
            user.ludoSpins -= 1;
          } else {
            if((user.gold||0) < 250) return user;
            user.gold -= 250;
          }
          user.lastSpinResult = applyPrize(user, chosen);
          return user;
        }, (err, committed, snap) => {
          btn.disabled = false;
          if(!committed){ toast(isFree ? 'لا يوجد لفات مجانية كافية' : 'رصيدك لا يكفي (250 جولد)'); return; }
          toast((snap.val() && snap.val().lastSpinResult) || 'تمت اللفة ✅');
        });
      }, 4100);
    }

    uRef.on('value', snap => {
      userState = snap.val() || { gold:0, ludoSpins:0, skills:{} };
      document.getElementById('gold').innerText = userState.gold || 0;
      document.getElementById('ludo-spins').innerText = userState.ludoSpins || 0;
      document.getElementById('spin-free-btn').disabled = (userState.ludoSpins || 0) < 1;
      document.getElementById('spin-paid-btn').disabled = (userState.gold || 0) < 250;
    });

    renderWheel('wheel-free', freePrizes);
    renderWheel('wheel-paid', paidPrizes);
    renderList('free-list', freePrizes);
    renderList('paid-list', paidPrizes);
  </script>
</body>
</html>

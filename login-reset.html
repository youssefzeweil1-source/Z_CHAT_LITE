<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة خدمة العملاء - استعادة الحساب</title>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>
    <style>
        :root { --main:#5b8cff; --pink:#ff7aa2; --green:#25c5a8; --bg:#0f1117; --panel:#171b24; --line:#2b3342; --muted:#9ca3b3; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; font-family:Tahoma, Arial, sans-serif; color:#eef1f7; background:radial-gradient(900px 600px at 10% -10%, rgba(91,140,255,.18), transparent), radial-gradient(900px 600px at 100% 0%, rgba(255,122,162,.14), transparent), var(--bg); }
        header { padding:22px 18px; border-bottom:1px solid var(--line); background:rgba(15,17,23,.82); backdrop-filter:blur(10px); position:sticky; top:0; z-index:10; }
        h1 { margin:0; font-size:clamp(1.25rem, 3vw, 1.8rem); background:linear-gradient(90deg,var(--main),var(--pink),var(--green)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .subtitle { margin-top:8px; color:var(--muted); font-size:.9rem; line-height:1.7; }
        main { width:min(1180px, 96vw); margin:18px auto; display:grid; grid-template-columns:360px 1fr; gap:14px; }
        .card { background:linear-gradient(180deg,#1b2130,#151a25); border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 38px rgba(0,0,0,.35); overflow:hidden; }
        .toolbar { padding:12px; display:flex; gap:8px; border-bottom:1px solid var(--line); background:#151c2a; }
        input, select, textarea { width:100%; border:1px solid #33415a; background:#0f1520; color:#fff; border-radius:10px; padding:10px; outline:none; font-family:inherit; }
        button { border:none; border-radius:10px; padding:10px 12px; cursor:pointer; font-weight:bold; font-family:inherit; }
        .primary { background:var(--main); color:#111; }
        .dark { background:#303a50; color:#fff; }
        .success { background:#25c5a8; color:#061411; }
        #requests-list { max-height:calc(100vh - 168px); overflow:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
        .request { border:1px solid #303a50; background:#111827; border-radius:12px; padding:10px; cursor:pointer; transition:.16s; }
        .request:hover, .request.active { border-color:var(--main); transform:translateY(-1px); }
        .request-email { font-weight:bold; direction:ltr; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .request-meta { margin-top:6px; color:var(--muted); font-size:.76rem; display:flex; justify-content:space-between; gap:8px; }
        .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; background:rgba(91,140,255,.16); color:#bcd0ff; border:1px solid rgba(91,140,255,.35); }
        .chat-head { padding:14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:flex-start; background:#151c2a; }
        .chat-title { font-weight:bold; direction:ltr; text-align:right; }
        .chat-info { color:var(--muted); font-size:.78rem; margin-top:6px; line-height:1.7; }
        #messages { height:calc(100vh - 300px); min-height:340px; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:8px; }
        .msg { max-width:82%; padding:9px 12px; border-radius:13px; line-height:1.6; white-space:pre-wrap; overflow-wrap:anywhere; }
        .msg.admin { align-self:flex-start; background:linear-gradient(135deg,var(--main),#7a73ff,var(--pink)); color:#fff; border-bottom-left-radius:4px; }
        .msg.user { align-self:flex-end; background:#252f42; border:1px solid #34415a; color:#e6ecf7; border-bottom-right-radius:4px; }
        .msg.system { align-self:center; max-width:94%; text-align:center; background:#24344f; color:#dce9ff; border:1px solid #3a4f73; }
        .time { display:block; margin-top:4px; font-size:.68rem; opacity:.75; direction:ltr; text-align:left; }
        .composer { padding:12px; border-top:1px solid var(--line); background:#151c2a; display:grid; gap:8px; }
        .composer-row { display:flex; gap:8px; }
        .empty { margin:auto; color:var(--muted); text-align:center; line-height:1.8; }
        @media (max-width: 820px) { main { grid-template-columns:1fr; } #requests-list { max-height:260px; } #messages { height:48vh; } }
    </style>
</head>
<body>
    <header>
        <h1>🛟 لوحة خدمة العملاء - طلبات استعادة الحساب</h1>
        <div class="subtitle">هذه اللوحة تعرض البريد وطلب الدعم فقط. لا يتم تخزين أو عرض كلمات المرور؛ وجّه المستخدم لاستخدام رابط إعادة التعيين الرسمي.</div>
    </header>
    <main>
        <section class="card">
            <div class="toolbar">
                <input id="search" type="search" placeholder="بحث بالإيميل..." oninput="renderRequests()">
                <select id="status-filter" onchange="renderRequests()">
                    <option value="">كل الحالات</option>
                    <option value="waiting_admin">بانتظار الرد</option>
                    <option value="open">مفتوح</option>
                    <option value="resolved">تم الحل</option>
                </select>
            </div>
            <div id="requests-list"><div class="empty">جاري تحميل الطلبات...</div></div>
        </section>
        <section class="card">
            <div class="chat-head">
                <div>
                    <div id="active-title" class="chat-title">اختر طلبًا من القائمة</div>
                    <div id="active-info" class="chat-info">ستظهر هنا محادثة العميل وبيانات الطلب الأساسية.</div>
                </div>
                <button class="success" onclick="markResolved()">تم الحل</button>
            </div>
            <div id="messages"><div class="empty">لا توجد محادثة مفتوحة.</div></div>
            <div class="composer">
                <textarea id="reply" rows="3" maxlength="700" placeholder="اكتب رد خدمة العملاء... لا ترسل كلمات مرور، أرسل خطوات آمنة فقط."></textarea>
                <div class="composer-row">
                    <button class="primary" onclick="sendAdminReply()">إرسال الرد</button>
                    <button class="dark" onclick="sendResetGuidance()">إرسال تعليمات آمنة</button>
                </div>
            </div>
        </section>
    </main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlim9FOvDcMqTJWINoBCHk3k6DNXS-jTo",
        databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "zeweil-chat",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let requests = {};
    let activeId = '';
    let activeMessagesRef = null;
    let activeMessagesCb = null;

    function escapeHTML(value = '') {
        return String(value).replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char]));
    }

    function formatDate(ts = 0) {
        if (!ts) return '—';
        return new Date(Number(ts)).toLocaleString('ar-EG', { dateStyle:'short', timeStyle:'short' });
    }

    function renderRequests() {
        const box = document.getElementById('requests-list');
        const q = document.getElementById('search').value.trim().toLowerCase();
        const status = document.getElementById('status-filter').value;
        const list = Object.entries(requests || {})
            .map(([id, data]) => ({ id, ...(data || {}) }))
            .filter(item => !q || String(item.email || '').toLowerCase().includes(q))
            .filter(item => !status || item.status === status)
            .sort((a, b) => Number(b.updatedAt || b.createdAt || 0) - Number(a.updatedAt || a.createdAt || 0));

        if (!list.length) {
            box.innerHTML = '<div class="empty">لا توجد طلبات مطابقة.</div>';
            return;
        }

        box.innerHTML = list.map(item => `
            <div class="request ${item.id === activeId ? 'active' : ''}" onclick="openRequest('${item.id}')">
                <div class="request-email">${escapeHTML(item.email || 'بدون بريد')}</div>
                <div class="request-meta"><span class="badge">${escapeHTML(item.status || 'open')}</span><span>${formatDate(item.updatedAt || item.createdAt)}</span></div>
                <div class="request-meta"><span>${escapeHTML(item.lastMessage || 'طلب جديد')}</span></div>
            </div>
        `).join('');
    }

    function detachMessages() {
        if (activeMessagesRef && activeMessagesCb) activeMessagesRef.off('value', activeMessagesCb);
        activeMessagesRef = null;
        activeMessagesCb = null;
    }

    function openRequest(id = '') {
        activeId = id;
        const item = requests[id] || {};
        document.getElementById('active-title').textContent = item.email || id;
        document.getElementById('active-info').textContent = `الحالة: ${item.status || 'open'} | تاريخ الطلب: ${formatDate(item.createdAt)} | آخر تحديث: ${formatDate(item.updatedAt || item.createdAt)}`;
        renderRequests();
        detachMessages();
        activeMessagesRef = db.ref(`supportResetRequests/${id}/messages`).limitToLast(160);
        activeMessagesCb = snap => renderMessages(snap.val() || {});
        activeMessagesRef.on('value', activeMessagesCb);
        db.ref(`supportResetRequests/${id}`).update({ status: item.status === 'resolved' ? 'resolved' : 'open', updatedAt: firebase.database.ServerValue.TIMESTAMP }).catch(() => {});
    }

    function renderMessages(raw = {}) {
        const box = document.getElementById('messages');
        const list = Object.values(raw || {}).sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
        if (!list.length) {
            box.innerHTML = '<div class="empty">لا توجد رسائل في هذا الطلب.</div>';
            return;
        }
        box.innerHTML = list.map(item => {
            const role = item.role === 'admin' ? 'admin' : (item.role === 'system' ? 'system' : 'user');
            return `<div class="msg ${role}">${escapeHTML(item.text || '')}<span class="time">${formatDate(item.timestamp)}</span></div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    function sendAdminReply(text) {
        if (!activeId) return alert('اختر طلبًا أولاً');
        const input = document.getElementById('reply');
        const body = String(text || input.value || '').trim();
        if (!body) return;
        db.ref(`supportResetRequests/${activeId}/messages`).push({
            role: 'admin',
            senderName: 'خدمة العملاء',
            text: body,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            input.value = '';
            return db.ref(`supportResetRequests/${activeId}`).update({
                status: 'open',
                lastMessage: body.slice(0, 120),
                lastMessageAt: firebase.database.ServerValue.TIMESTAMP,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }).catch(() => alert('تعذر إرسال الرد'));
    }

    function sendResetGuidance() {
        sendAdminReply('لحماية حسابك لا يمكننا معرفة أو إرسال كلمة مرورك. من فضلك استخدم رسالة إعادة التعيين المرسلة إلى بريدك، أو أخبرنا ببيانات تحقق غير حساسة مثل اسم الحساب وآخر غرفة دخلتها.');
    }

    function markResolved() {
        if (!activeId) return alert('اختر طلبًا أولاً');
        db.ref(`supportResetRequests/${activeId}`).update({ status:'resolved', updatedAt: firebase.database.ServerValue.TIMESTAMP })
            .then(() => sendAdminReply('تم إغلاق الطلب كطلب تم حله. إذا احتجت مساعدة إضافية أرسل رسالة هنا.'))
            .catch(() => alert('تعذر تحديث الحالة'));
    }

    db.ref('supportResetRequests').limitToLast(200).on('value', snap => {
        requests = snap.val() || {};
        renderRequests();
        if (activeId && requests[activeId]) {
            const item = requests[activeId];
            document.getElementById('active-info').textContent = `الحالة: ${item.status || 'open'} | تاريخ الطلب: ${formatDate(item.createdAt)} | آخر تحديث: ${formatDate(item.updatedAt || item.createdAt)}`;
        }
    });
</script>
</body>
</html>

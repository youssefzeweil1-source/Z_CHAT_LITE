<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℤ𝔼𝕎𝔼𝕀𝕃 ℂℍ𝔸𝕋 𝕃𝕀𝕋𝔼</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --main-color: #0f0; --bg-dark: #111; --panel-bg: #1a1a1a; --text-gray: #888; }
        body { background-color: var(--bg-dark); color: white; font-family: Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        
        .brand-title { color: var(--main-color); text-shadow: 0 0 15px var(--main-color); font-size: 1.8rem; margin: 10px 0; letter-spacing: 2px; text-align: center; }

        #chat-box { width: 95%; max-width: 700px; height: 500px; overflow-y: auto; background: var(--panel-bg); border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid #333; display: flex; flex-direction: column; }
        .message { max-width: 85%; padding: 10px 15px; margin: 8px 0; border-radius: 15px; cursor: pointer; word-wrap: break-word; line-height: 1.4; transition: 0.2s; position: relative; }
        .my-message { background-color: var(--main-color); color: #000; align-self: flex-end; border-bottom-right-radius: 0; }
        .other-message { background-color: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
        .system-message { align-self: center; background: linear-gradient(135deg, #004400, #00aa00); color: #fff; font-weight: bold; text-align: center; border: 1px solid #00ff99; box-shadow: 0 0 15px rgba(0,255,120,0.35); max-width: 95%; }
        
        .big-emoji { font-size: 50px; background: none !important; border: none !important; padding: 0 !important; align-self: center; cursor: default; }

        #emoji-picker { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #1a1a1a; border: 2px solid var(--main-color); border-radius: 15px; padding: 15px; display: none; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; z-index: 4000; box-shadow: 0 -10px 25px rgba(0,0,0,0.8); }
        .emoji-item { font-size: 24px; cursor: pointer; padding: 5px; transition: 0.2s; }
        #gif-picker { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 700px; background: #1a1a1a; border: 2px solid var(--main-color); border-radius: 15px; padding: 12px; display: none; flex-wrap: wrap; gap: 10px; max-height: 320px; overflow-y: auto; z-index: 4100; box-shadow: 0 -10px 25px rgba(0,0,0,0.8); }
        .gif-item { width: 120px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .gif-item:hover { transform: scale(1.04); border-color: var(--main-color); }
        .gif-message { max-width: 220px; border-radius: 10px; display: block; }
        .message-status { display:block; font-size:0.72rem; margin-top:6px; color:#1c1c1c; text-align:left; direction:ltr; user-select:none; }
        .message-status.readable { cursor:pointer; text-decoration: underline dotted; }
        .message-status.sending { color:#6a5200; }
        .message-status.error { color:#a10000; }
        .message-date { display:block; font-size:0.7rem; margin-top:4px; opacity:0.8; }
        .my-message .message-date { color:#1c1c1c; text-align:left; direction:ltr; }
        .other-message .message-date { color:#c9c9c9; text-align:right; }
        .system-message .message-date { color:#eaffea; text-align:center; }

        #friendsListContainer { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: #151515; border-left: 2px solid var(--main-color); box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; z-index: 2000; transition: 0.4s ease-in-out; }
        #friendsListContainer.active { right: 0; }
        
        .tab-btn { flex: 1; padding: 12px; background: none; color: var(--text-gray); border: none; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--main-color); border-bottom: 2px solid var(--main-color); }

        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(5px); }
        .custom-modal { background: #1a1a1a; border: 2px solid var(--main-color); border-radius: 15px; padding: 25px; width: 280px; text-align: center; }

        .friend-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .friend-avatar { width: 35px; height: 35px; background: var(--main-color); border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-left: 10px; }
        .online-dot { width: 10px; height: 10px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #0f0; }
        .offline-dot { width: 10px; height: 10px; background: #ff3333; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #ff3333; }
        .friend-status { font-size: 0.75rem; margin-top: 4px; }
        .friend-status.online { color: #66ff66; }
        .friend-status.offline { color: #ff6666; }

        #friend-delete-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82); display: none; justify-content: center; align-items: center; z-index: 3500; }
        #room-password-modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.82); display:none; justify-content:center; align-items:center; z-index:3600; }
        #room-password-input { width:100%; margin-top:10px; }

        #top-buttons-container { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .top-button { background-color: var(--main-color); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: none; }

        .input-group { width: 95%; max-width: 700px; display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button#sendBtn { background: var(--main-color); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: black; }
        .emoji-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
        #loadOlderBtn { display:none; align-self:center; margin: 4px 0 10px; background:#2a2a2a; color:#fff; border:1px solid #444; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.85rem; }
        #typing-indicator { width:95%; max-width:700px; min-height:20px; color:#9adf9a; font-size:0.85rem; margin-top:5px; }
        #selected-gif-preview { display:none; width:95%; max-width:700px; margin-top:6px; background:#1a1a1a; border:1px solid #2d2d2d; border-radius:10px; padding:8px; align-items:center; gap:8px; }
        #selected-gif-preview img { width:72px; height:54px; object-fit:cover; border-radius:6px; border:1px solid #333; }
        .section-loading { color:#9a9a9a; text-align:center; padding:16px 8px; font-size:0.9rem; }
        #global-loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .global-loading-box { background:#1a1a1a; border:2px solid var(--main-color); border-radius:12px; padding:18px 22px; display:flex; align-items:center; gap:10px; box-shadow:0 0 18px rgba(0,255,0,0.2); }
        .loading-spinner { width:20px; height:20px; border:3px solid #2f2f2f; border-top-color: var(--main-color); border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="global-loading-overlay">
        <div class="global-loading-box">
            <div class="loading-spinner"></div>
            <div id="global-loading-text">جاري التحميل...</div>
        </div>
    </div>

    <div id="top-buttons-container">
        <button class="top-button" onclick="toggleFriendsPanel()">🤝 <span id="friendsCount" style="position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:10px; padding:2px 6px; border-radius:10px; border:1px solid white">0</span></button>
    </div>

    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <div id="modal-user-name" style="color:var(--main-color); font-weight:bold; margin-bottom:20px;"></div>
            <button id="modal-reply-btn" onclick="modalReply()" style="width:100%; padding:12px; margin-bottom:10px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">الرد على الرسالة</button>
            <button id="modal-add-friend-btn" onclick="modalAddFriend()" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">إرسال طلب صداقة</button>
            <button id="modal-edit-btn" onclick="modalEditMessage()" style="width:100%; padding:12px; margin-top:10px; background:#ffb300; color:#111; border:none; border-radius:8px; font-weight:bold; cursor:pointer; display:none;">تعديل الرسالة</button>
            <button id="modal-delete-btn" onclick="modalDeleteMessage()" style="width:100%; padding:12px; margin-top:10px; background:#ff3333; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; display:none;">حذف الرسالة</button>
            <button onclick="closeCustomModal()" style="margin-top:15px; background:none; border:none; color:#ff4444; cursor:pointer; text-decoration:underline;">إلغاء</button>
        </div>
    </div>

    <div id="friend-delete-modal-overlay">
        <div class="custom-modal">
            <div id="friend-delete-name" style="color:var(--main-color); font-weight:bold; margin-bottom:16px;"></div>
            <button onclick="confirmDeleteFriend()" style="width:100%; padding:12px; margin-bottom:10px; background:#ff3333; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حذف صديق</button>
            <button onclick="closeDeleteFriendModal()" style="width:100%; padding:12px; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="room-password-modal-overlay">
        <div class="custom-modal">
            <div style="color:var(--main-color); font-weight:bold; margin-bottom:8px;">🔒 غرفة محمية بكلمة مرور</div>
            <div id="room-password-modal-room" style="color:#ccc; font-size:0.9rem;"></div>
            <input type="text" id="room-password-input" placeholder="اكتب كلمة المرور">
            <button onclick="confirmRoomJoinWithPassword()" style="width:100%; padding:12px; margin-top:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">دخول الغرفة</button>
            <button onclick="closeRoomPasswordModal()" style="width:100%; padding:12px; margin-top:10px; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="seen-by-modal-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.82); display:none; justify-content:center; align-items:center; z-index:3700;">
        <div class="custom-modal" style="width:320px; max-height:75vh; overflow-y:auto; text-align:right;">
            <div style="color:var(--main-color); font-weight:bold; margin-bottom:10px;">👀 من شاف الرسالة</div>
            <div id="seen-by-list" style="font-size:0.9rem; color:#ddd;"></div>
            <button onclick="closeSeenByModal()" style="width:100%; padding:10px; margin-top:12px; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="friendsListContainer">
        <div style="padding:20px; background:#1a1a1a; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--main-color); font-weight:bold;">قائمة التواصل</span>
            <button onclick="toggleFriendsPanel()" style="background:none; color:white; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div style="display:flex; background:#111; padding:5px;">
            <button onclick="switchTab('friends')" id="tab-f" class="tab-btn active">الأصدقاء</button>
            <button onclick="switchTab('requests')" id="tab-r" class="tab-btn">الطلبات</button>
        </div>
        <div id="friends-tab" style="overflow-y:auto; flex:1;"></div>
        <div id="requests-tab" style="overflow-y:auto; flex:1; display:none;"></div>
    </div>

    <div class="brand-title">ℤ𝔼𝕎𝔼𝕀𝕃 ℂℍ𝔸𝕋 𝕃𝕀𝕋𝔼</div>

    <div id="login-section" style="width:95%; max-width:400px; background:#1a1a1a; padding:25px; border-radius:15px; border:1px solid #333; text-align:center;">
        <input type="text" id="roomCode" placeholder="كود الغرفة">
        <input type="text" id="username" placeholder="اسمك المستعار" style="margin-top:10px; width:90%">
        <button onclick="joinRoom()" style="width:100%; margin-top:20px; padding:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">دخول الدردشة</button>
    </div>

    <div id="chat-box">
        <button id="loadOlderBtn" onclick="loadOlderMessages()">عرض الرسائل الأقدم</button>
        <div id="messages-container"></div>
    </div>

    <div id="emoji-picker"></div>
    <div id="gif-picker"></div>

    <div id="reply-box" style="display:none; width:95%; max-width:700px; background:#222; border-right:4px solid var(--main-color); padding:10px; border-radius:5px; margin-bottom:5px;">
        <div id="replySender" style="color:var(--main-color); font-weight:bold; font-size:0.8em;"></div>
        <div id="replyText" style="font-size:0.8em; color:#ccc;"></div>
        <button onclick="closeReplyBox()" style="font-size:9px; background:#444; color:white; border:none; margin-top:5px; padding:2px 5px; cursor:pointer;">إلغاء الرد</button>
    </div>

    <div id="typing-indicator"></div>

    <div id="selected-gif-preview">
        <img id="selected-gif-preview-img" alt="GIF">
        <div style="flex:1; color:#bbb; font-size:0.85rem;">GIF جاهز للإرسال</div>
        <button onclick="clearSelectedGif()" style="background:#333; color:#fff; border:none; border-radius:6px; cursor:pointer; padding:6px 10px;">إلغاء</button>
    </div>

    <div class="input-group">
        <button class="emoji-btn" onclick="toggleEmojiPicker()">🤩</button>
        <button class="emoji-btn" onclick="toggleGifPicker()">🎞️</button>
        <input type="text" id="messageInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlim9FOvDcMqTJWINoBCHk3k6DNXS-jTo",
        databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "zeweil-chat",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", currentUser = "", userId = "", replyingTo = null;
    let currentModalData = {};
    let pendingDeleteFriendId = null;
    let presenceInitialized = false;
    let friendRefs = {};
    let friendDataCache = {};
    let messagesWindowSize = 5;
    let currentMessagesQuery = null;
    let hasOlderMessages = false;
    let pendingRoomJoin = null;
    let typingListenerRef = null;
    let typingListenerCallback = null;
    let typingStopTimeout = null;
    let pendingGifUrl = '';
    let disconnectLeaveRef = null;
    let disconnectLeavePayload = null;
    let globalLoadingCount = 0;
    let pendingMessageMap = {};
    let seenMarkQueue = {};
    let seenFlushTimer = null;
    let seenMarkedCache = {};
    let currentIdentityKey = '';
    let friendsListRef = null;
    let requestsListRef = null;

    function showGlobalLoading(text = 'جاري التحميل...') {
        const overlay = document.getElementById('global-loading-overlay');
        const label = document.getElementById('global-loading-text');
        globalLoadingCount += 1;
        if (label) label.innerText = text;
        if (overlay) overlay.style.display = 'flex';
    }

    function hideGlobalLoading() {
        const overlay = document.getElementById('global-loading-overlay');
        globalLoadingCount = Math.max(0, globalLoadingCount - 1);
        if (overlay && globalLoadingCount === 0) overlay.style.display = 'none';
    }

    function escapeHTML(value = "") {
        return value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function toIdentityKey(name = '') {
        return (name || '')
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '_')
            .replace(/[^a-z0-9_\-؀-ۿ]/g, '');
    }

    function getCurrentSocialBasePath() {
        if (currentIdentityKey) return `socialByName/${currentIdentityKey}`;
        return `users/${userId}`;
    }

    function isJoinLeaveMessage(text = '') {
        if (!text) return false;
        return text.startsWith('لقد انضم ') || text.startsWith('لقد غادر ');
    }

    function pushSystemMessage(room, text) {
        if (!room || !text) return;
        db.ref(`rooms/${room}/messages`).push({
            userId: 'system',
            name: 'SYSTEM',
            message: text,
            isSystem: true,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function setupPresenceTracking() {
        if (!userId || presenceInitialized) return;
        presenceInitialized = true;

        const userRef = db.ref(`users/${userId}`);
        const connectedRef = db.ref('.info/connected');

        connectedRef.on('value', snap => {
            if (snap.val() !== true) return;

            userRef.onDisconnect().update({
                online: false,
                currentRoom: '',
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });

            if (disconnectLeaveRef && disconnectLeavePayload) {
                disconnectLeaveRef.onDisconnect().set(disconnectLeavePayload);
            }

            const liveUpdate = {
                online: true,
                lastSeen: Date.now()
            };

            if (currentUser) liveUpdate.name = currentUser;
            if (currentRoom) liveUpdate.currentRoom = currentRoom;

            userRef.update(liveUpdate);
        });
    }

    const myEmojis = ["🤩","😍","🥰","😇","😊","😉","🙃","🙂","😂","🤣","😅","😆","😁","😄","😃","😀","🤭","🤗","🤑","😝","🤪","😜","😛","😋","🥲","😙","😚","☺️","😘","😗","🙂‍↔️","🤥","😮‍💨","😬","🙄","😒","😏","😶‍🌫️","😶","😑","😐","🤨","🤐","🤔","😵","🥴","🥶","🥵","🤒","😷","🤕","😴","🤤","😪","😔","😌","🙂‍↕️","😳","😲","😯","😮","☹️","🙁","😟","😕","🧐","🤓","😎","🥸","🥳","🤠","🤯","😵‍💫","😺","🥱","😫","😓","😞","😣","😖","😧","😦","😥","😢","😭","🥺","😾","😿","😹","😸","😻","😽","😼","🙀","👋","🤚","💤","🤏","🤌","👌","👋","👊","✊","👎","👎","☝️","👇","👉","👈","🤝","🙌","👏","🤛","🤜","❤️‍🔥","❤️‍🩹","❤️","🧡","💛","💚","💙","💜","🤎","💔","❣️","💟","💕","💞","💓","💗","💖","💝","💘","🇪🇬","🇱🇾","🇲🇦","🇰🇼","🇮🇶","🇹🇳","🇹🇷","🇸🇾","🇸🇩","🇸🇦","🇵🇸","🇶🇦","🇯🇴","🇪🇭","🇩🇿"];

    const gifUrls = [
        "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExenA0cTRkbnBkdGZ5cWlzajVtejhnbXd4cG5wbDd4MXYyY2FuZjFibyZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/OuQmhmAAdJFLi/giphy.gif",

        "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bGJsODNsMzBkcDB6czE1Y3YxNW5nbnlzejJyeXNhbGtvM29kbHR4cCZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/Khu9pLrInO0FHyO7Pu/giphy.gif",

    function isOnlyEmoji(str) {
        const emojiRegex = /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff]|[\u200d\uFE0F])+$/;
        return emojiRegex.test(str.replace(/\s/g, ''));
    }

    function initGifPicker() {
        const g = document.getElementById('gif-picker');
        g.innerHTML = "";
        gifUrls.forEach(url => {
            const img = document.createElement('img');
            img.className = 'gif-item';
            img.src = url;
            img.alt = 'gif';
            img.loading = 'lazy';
            img.referrerPolicy = 'no-referrer';
            img.dataset.originalUrl = url;
            img.onerror = () => {
                if (img.dataset.fallbackTried === '1') {
                    img.style.display = 'none';
                    return;
                }
                const fallback = toGiphyCdnFallback(img.dataset.originalUrl || '');
                if (!fallback) {
                    img.style.display = 'none';
                    return;
                }
                img.dataset.fallbackTried = '1';
                img.src = fallback;
            };
            img.onclick = () => {
                const chosen = img.currentSrc || url;
                setSelectedGif(chosen);
                document.getElementById('messageInput').value = '';
                g.style.display = 'none';
            };
            g.appendChild(img);
        });
    }

    function isGifUrl(value = '') {
        return /https:\/\/(media\d*\.giphy\.com|media\.giphy\.com|i\.giphy\.com)\/.+\.gif(\?.*)?$/i.test(value.trim());
    }

    function toGiphyCdnFallback(url = '') {
        const match = url.match(/\/([^\/?#]+)\/giphy\.gif/i);
        if (!match) return null;
        return `https://i.giphy.com/${match[1]}.gif`;
    }

    function getMessageTimestamp(data = {}) {
        if (typeof data.timestamp === 'number' && Number.isFinite(data.timestamp)) return data.timestamp;
        if (data._localPending || data._localError) return Date.now();
        return 0;
    }

    function formatMessageDate(timestamp) {
        if (!timestamp) return '—';
        const d = new Date(timestamp);
        if (Number.isNaN(d.getTime())) return '—';
        const day = d.getDate();
        const month = d.getMonth() + 1;
        const year = d.getFullYear();
        const time12 = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(/\s?(AM|PM)$/i, '');
        return `${day}/${month}/${year} ${time12}`;
    }

    function compareMessagesByOrder(a, b) {
        const ta = Number(a.dataset.timestamp || '0');
        const tb = Number(b.dataset.timestamp || '0');
        if (ta !== tb) return ta - tb;
        return (a.id || '').localeCompare(b.id || '');
    }

    function insertMessageElementSorted(container, element) {
        const children = Array.from(container.children).filter(c => c.classList.contains('message'));
        for (const child of children) {
            if (compareMessagesByOrder(element, child) < 0) {
                container.insertBefore(element, child);
                return;
            }
        }
        container.appendChild(element);
    }

    function resetSeenMarkState() {
        seenMarkQueue = {};
        seenMarkedCache = {};
        if (seenFlushTimer) {
            clearTimeout(seenFlushTimer);
            seenFlushTimer = null;
        }
    }

    function flushSeenMarks() {
        seenFlushTimer = null;
        if (!currentRoom || !userId) {
            seenMarkQueue = {};
            return;
        }
        const keys = Object.keys(seenMarkQueue);
        if (!keys.length) return;

        const payload = {};
        keys.forEach(key => {
            payload[`${key}/seenBy/${userId}`] = seenMarkQueue[key];
        });
        seenMarkQueue = {};
        db.ref(`rooms/${currentRoom}/messages`).update(payload);
    }

    function scheduleSeenMark(key) {
        if (!key || seenMarkedCache[key]) return;
        seenMarkedCache[key] = true;
        seenMarkQueue[key] = {
            name: currentUser || 'مستخدم',
            at: firebase.database.ServerValue.TIMESTAMP
        };
        if (!seenFlushTimer) {
            seenFlushTimer = setTimeout(flushSeenMarks, 120);
        }
    }

    function renderMessagesSnapshot(snap) {
        const container = document.getElementById('messages-container');
        const chatBox = document.getElementById('chat-box');
        const wasNearBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 80;
        const firstPaint = container.querySelector('.section-loading') !== null;

        const frag = document.createDocumentFragment();
        const rows = [];
        snap.forEach(child => {
            rows.push({ key: child.key, data: child.val() });
        });

        rows.sort((a, b) => {
            const ta = getMessageTimestamp(a.data);
            const tb = getMessageTimestamp(b.data);
            if (ta !== tb) return ta - tb;
            return a.key.localeCompare(b.key);
        });

        rows.forEach(row => {
            const tempKey = pendingMessageMap[row.key];
            if (tempKey) {
                delete pendingMessageMap[row.key];
            }
            const node = createMessageElement(row.key, row.data);
            if (node) frag.appendChild(node);
        });

        container.innerHTML = '';
        container.appendChild(frag);

        const seenRows = rows.slice(-20);
        seenRows.forEach(row => markMessageSeen(row.key, row.data));

        if (firstPaint || wasNearBottom) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        updateLoadOlderButton();
    }

    function setupMessagesListener() {
        if (!currentRoom) return;
        detachMessagesListener();

        const container = document.getElementById('messages-container');
        container.innerHTML = '<div class="section-loading">جاري تحميل الرسائل...</div>';

        const query = db.ref(`rooms/${currentRoom}/messages`).limitToLast(messagesWindowSize);
        currentMessagesQuery = query;

        query.on('value', snap => {
            renderMessagesSnapshot(snap);
        });

        db.ref(`rooms/${currentRoom}/messages`).limitToLast(messagesWindowSize + 1).once('value', snap => {
            hasOlderMessages = snap.numChildren() > messagesWindowSize;
            updateLoadOlderButton();
        });
    }

    function loadOlderMessages() {
        if (!currentRoom) return;
        showGlobalLoading('جاري تحميل الرسائل الأقدم...');
        messagesWindowSize += 5;
        setupMessagesListener();
        setTimeout(hideGlobalLoading, 350);
    }

        const password = document.getElementById('room-password-input').value.trim();

        const room = pendingRoomJoin;
        closeRoomPasswordModal();
        joinRoom(room, password);

    function userIsRoomMember(roomData) {
        if (!roomData) return false;
        if (roomData.allowedUsers && roomData.allowedUsers[userId]) return true;
        if (roomData.members && roomData.members[userId]) return true;
        return false;
    }

    function clearDisconnectLeaveMessage() {
        if (disconnectLeaveRef) {
            disconnectLeaveRef.onDisconnect().cancel();
            disconnectLeaveRef = null;
        }
        disconnectLeavePayload = null;
    }

    function setupDisconnectLeaveMessage(room, name) {
        clearDisconnectLeaveMessage();
        if (!room || !name) return;

        disconnectLeaveRef = db.ref(`rooms/${room}/messages`).push();
        disconnectLeavePayload = {
            userId: 'system',
            name: 'SYSTEM',
            message: `لقد غادر ${name}`,
            isSystem: true,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        disconnectLeaveRef.onDisconnect().set(disconnectLeavePayload);
    }

    function renderTypingIndicator(data = {}) {
        const names = [];
        const now = Date.now();
        Object.keys(data).forEach(id => {
            if (id === userId) return;
            const row = data[id];
            if (!row || !row.name) return;
            if (row.updatedAt && now - row.updatedAt > 7000) return;
            names.push(row.name);
        });

        const indicator = document.getElementById('typing-indicator');
        if (!names.length) {
            indicator.innerText = '';
        } else if (names.length === 1) {
            indicator.innerText = `${names[0]} يكتب الآن...`;
        } else {
            indicator.innerText = `${names.slice(0, 2).join(' و ')} يكتبان الآن...`;
        }
    }

    function clearTypingListener() {
        if (typingListenerRef && typingListenerCallback) {
            typingListenerRef.off('value', typingListenerCallback);
        }
        typingListenerRef = null;
        typingListenerCallback = null;
        document.getElementById('typing-indicator').innerText = '';
    }

    function setTypingState(isTyping) {
        if (!currentRoom || !userId || !currentUser) return;
        const typingRef = db.ref(`rooms/${currentRoom}/typing/${userId}`);
        if (isTyping) {
            typingRef.set({
                name: currentUser,
                updatedAt: Date.now()
            });
        } else {
            typingRef.remove();
        }
    }

    function setupTypingListener(room) {
        clearTypingListener();
        typingListenerRef = db.ref(`rooms/${room}/typing`);
        typingListenerCallback = snap => {
            renderTypingIndicator(snap.val() || {});
        };
        typingListenerRef.on('value', typingListenerCallback);
    }

    function getPreferredUsername() {
        const stored = (localStorage.getItem('lastChatName') || '').trim();
        if (stored) return stored;
        return (currentUser || '').trim();
    }

    function prefillLoginFields(room = '') {
        const roomInput = document.getElementById('roomCode');
        const userInput = document.getElementById('username');
        if (roomInput && room) roomInput.value = room;
        const preferred = getPreferredUsername();
        if (userInput && preferred) userInput.value = preferred;
    }

    function joinFriendRoom(roomCode) {
        const room = (roomCode || '').trim();
        if (!room) return;
        prefillLoginFields(room);
        joinRoom(room);
    }

    function joinRoom(targetRoom = null, providedPassword = null) {
        const room = targetRoom || document.getElementById('roomCode').value.trim();
        const typedName = document.getElementById('username').value.trim();
        const name = (currentUser || typedName || getPreferredUsername()).trim();
        if (!room || !name) return alert("أكمل البيانات");
        if (room === currentRoom) return;

        showGlobalLoading('جاري دخول الغرفة...');
        db.ref(`rooms/${room}`).once('value').then(s => {
            const rd = s.val();
            if (!rd) {
                alert("الغرفة غير موجودة.");
                return;
            }
            if (rd.status === "closed") {
                alert("الغرفة مغلقة.");
                return;
            }

            const requiresPassword = !!rd.password || rd.status === 'passwordProtected';
            if (requiresPassword) {
                const validPassword = providedPassword && rd.password && providedPassword === rd.password;
                if (!validPassword) {
                    openRoomPasswordModal(room);
                    return;
                }
            }

            if (rd.status === 'membersOnly' && !userIsRoomMember(rd)) {
                alert('هذه الغرفة للأعضاء فقط 🔐');
                return;
            }

            const previousRoom = currentRoom;
            if (previousRoom) {
                setTypingState(false);
                clearTypingListener();
                detachMessagesListener();
                resetSeenMarkState();
                if (previousRoom !== room) {
                    pushSystemMessage(previousRoom, `لقد غادر ${name}`);
                }
            }

            currentRoom = room;
            resetSeenMarkState();
            currentUser = name;
            localStorage.setItem('lastChatName', name);
            currentIdentityKey = toIdentityKey(name);
            document.getElementById('login-section').style.display = 'none';
            messagesWindowSize = 5;
            db.ref(`users/${userId}`).update({ name, online: true, currentRoom: room, lastSeen: Date.now(), identityKey: currentIdentityKey || null });
            listenToFriends();
            listenToRequests();
            setupMessagesListener();
            setupTypingListener(room);
            setupDisconnectLeaveMessage(room, name);
            pushSystemMessage(room, `لقد انضم ${name}`);
        }).catch(() => {
            alert('حدث خطأ أثناء دخول الغرفة');
        }).finally(() => {
            hideGlobalLoading();
        });
    }

    function createMessageElement(key, data = {}) {
        const div = document.createElement('div');
        div.id = key;
        div.dataset.timestamp = String(getMessageTimestamp(data));

        if (data && data.isSystem) {
            div.className = 'message system-message';
            const safeSystemText = escapeHTML(data.message || '');
            const showDate = !isJoinLeaveMessage(data.message || '');
            div.innerHTML = showDate
                ? `${safeSystemText}<span class="message-date">${formatMessageDate(getMessageTimestamp(data))}</span>`
                : safeSystemText;
            return div;
        }

        const isMine = data.userId === userId;
        const emojiOnly = isOnlyEmoji(data.message);
        div.className = `message ${isMine ? 'my-message' : 'other-message'} ${emojiOnly ? 'big-emoji' : ''}`;

        const safeName = escapeHTML(data.name || 'مستخدم');
        const rawMessage = data.message || '';
        const safeMessage = escapeHTML(rawMessage);
        const gifMessage = isGifUrl(rawMessage);
        const safeGifUrl = escapeHTML(rawMessage);
        const editedTag = data.editedAt ? ' <span style="font-size:0.75em; color:#bbb;">(تم التعديل)</span>' : '';
        let content = `<strong>${safeName}${editedTag}:</strong><br>`;
        if(data.replyTo) {
            const safeReplyName = escapeHTML(data.replyTo.tName || 'مستخدم');
            const safeReplyText = escapeHTML(data.replyTo.mText || '');
            content += `<div style="background:rgba(0,0,0,0.1); padding:5px; border-right:2px solid black; margin-bottom:5px; font-size:0.8em;">الرد على ${safeReplyName}: ${safeReplyText}</div>`;
        }

        const statusMarkup = getMessageStatusMarkup(data, isMine);

        if (gifMessage) {
            div.innerHTML = content + `<img class="gif-message" src="${safeGifUrl}" alt="GIF" loading="lazy" referrerpolicy="no-referrer">` + statusMarkup;
            const gifEl = div.querySelector('.gif-message');
            if (gifEl) {
                gifEl.onerror = () => {
                    if (gifEl.dataset.fallbackTried === '1') {
                        gifEl.style.display = 'none';
                        return;
                    }
                    const fallback = toGiphyCdnFallback(rawMessage);
                    if (!fallback) {
                        gifEl.style.display = 'none';
                        return;
                    }
                    gifEl.dataset.fallbackTried = '1';
                    gifEl.src = fallback;
                };
            }
        } else {
            div.innerHTML = (emojiOnly ? safeMessage : content + safeMessage) + statusMarkup;
        }

        const dateSpan = document.createElement('span');
        dateSpan.className = 'message-date';
        dateSpan.innerText = formatMessageDate(getMessageTimestamp(data));
        div.appendChild(dateSpan);

        div.onclick = () => openActionModal(data.userId, data.name, key, data.message);
        return div;
    }

    function addMessage(key, data, options = {}) {
        const autoScroll = options.autoScroll !== false;
        const container = document.getElementById('messages-container');
        if (document.getElementById(key)) return;
        const chatBox = document.getElementById('chat-box');
        const wasNearBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 80;

        const div = createMessageElement(key, data);
        if (!div) return;
        insertMessageElementSorted(container, div);
        markMessageSeen(key, data);

        if (autoScroll && wasNearBottom) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        const outgoingMessage = pendingGifUrl || text;
        if (!outgoingMessage || !currentRoom) return;

        const msg = {
            userId,
            name: currentUser,
            message: outgoingMessage,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        if (replyingTo) { msg.replyTo = replyingTo; closeReplyBox(); }

        const msgRef = db.ref(`rooms/${currentRoom}/messages`).push();
        const tempKey = `tmp-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
        pendingMessageMap[msgRef.key] = tempKey;
        addMessage(tempKey, { ...msg, _localPending: true });

        msgRef.set(msg).then(() => {
            removeMessage(tempKey);
            delete pendingMessageMap[msgRef.key];
        }).catch(() => {
            removeMessage(tempKey);
            addMessage(`err-${tempKey}`, { ...msg, _localError: true }, { autoScroll: true });
            delete pendingMessageMap[msgRef.key];
        });

        input.value = "";
        clearSelectedGif();
        setTypingState(false);
    }

    function getMessageStatusMarkup(data, isMine) {
        if (!isMine) return '';
        if (data._localPending) {
            return '<span class="message-status sending">⏰ جاري الإرسال...</span>';
        }
        if (data._localError) {
            return '<span class="message-status error">⚠️ فشل الإرسال</span>';
        }

        const seenBy = data.seenBy || {};
        const seenCount = Object.keys(seenBy).filter(id => id !== userId).length;
        if (seenCount > 0) {
            const safeSeen = escapeHTML(JSON.stringify(seenBy));
            return `<span class="message-status readable" onclick='openSeenByModal(${safeSeen}); event.stopPropagation();'>✔✔ شوهد (${seenCount})</span>`;
        }
        return '<span class="message-status">✔ تم الإرسال</span>';
    }

    function markMessageSeen(key, data) {
        if (!currentRoom || !userId || !key) return;
        if (!data || data.userId === userId || data.isSystem || data._localPending) return;
        if (data.seenBy && data.seenBy[userId]) {
            seenMarkedCache[key] = true;
            return;
        }
        scheduleSeenMark(key);
    }

    function openSeenByModal(seenByObj = {}) {
        const list = document.getElementById('seen-by-list');
        const entries = Object.entries(seenByObj || {}).filter(([id]) => id !== userId);
        if (!entries.length) {
            list.innerHTML = '<div>لا يوجد مشاهدات بعد.</div>';
        } else {
            list.innerHTML = entries.map(([, v]) => `<div style="padding:6px 0; border-bottom:1px solid #333;">${escapeHTML((v && v.name) || 'مستخدم')}</div>`).join('');
        }
        document.getElementById('seen-by-modal-overlay').style.display = 'flex';
    }

    function closeSeenByModal() {
        document.getElementById('seen-by-modal-overlay').style.display = 'none';
    }

    function openActionModal(tId, tName, mKey, mText) {
        currentModalData = { tId, tName, mKey, mText };
        const isMine = tId === userId;

        document.getElementById('modal-user-name').innerText = isMine ? 'خيارات رسالتك' : `خيارات مع ${tName}`;
        document.getElementById('modal-reply-btn').style.display = isMine ? 'none' : 'block';
        document.getElementById('modal-add-friend-btn').style.display = isMine ? 'none' : 'block';
        document.getElementById('modal-edit-btn').style.display = isMine ? 'block' : 'none';
        document.getElementById('modal-delete-btn').style.display = isMine ? 'block' : 'none';

        document.getElementById('custom-modal-overlay').style.display = 'flex';
    }

    function closeCustomModal() { document.getElementById('custom-modal-overlay').style.display = 'none'; }

    function modalEditMessage() {
        if (!currentRoom || !currentModalData.mKey) return;
        const updatedText = prompt('اكتب النص الجديد:', currentModalData.mText || '');
        if (updatedText === null) return;
        const trimmed = updatedText.trim();
        if (!trimmed) return alert('الرسالة لا يمكن تكون فاضية');

        db.ref(`rooms/${currentRoom}/messages/${currentModalData.mKey}`).update({
            message: trimmed,
            editedAt: firebase.database.ServerValue.TIMESTAMP
        });

        closeCustomModal();
    }

    function modalDeleteMessage() {
        if (!currentRoom || !currentModalData.mKey) return;
        if (!confirm('متأكد إنك عايز تحذف الرسالة؟')) return;

        db.ref(`rooms/${currentRoom}/messages/${currentModalData.mKey}`).remove();
        closeCustomModal();
    }
    
    function modalReply() {
        replyingTo = currentModalData;
        document.getElementById('reply-box').style.display = 'block';
        document.getElementById('replySender').innerText = `الرد على ${currentModalData.tName}`;
        document.getElementById('replyText').innerText = currentModalData.mText.substring(0, 30) + "...";
        closeCustomModal();
    }

    function modalAddFriend() {
        if (!currentModalData.tId) return;
        const writes = [];
        writes.push(db.ref(`users/${currentModalData.tId}/friendRequests/${userId}`).set({ fromName: currentUser }));
        const targetIdentityKey = toIdentityKey(currentModalData.tName || '');
        if (targetIdentityKey) {
            writes.push(db.ref(`socialByName/${targetIdentityKey}/friendRequests/${userId}`).set({ fromName: currentUser }));
        }
        Promise.all(writes).finally(() => {
            alert("تم إرسال الطلب!");
            closeCustomModal();
        });
    }

    function formatOfflineDuration(lastSeen) {
        if (!lastSeen) return 'غير متصل';
        const diff = Math.max(0, Date.now() - Number(lastSeen));
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return 'غير متصل منذ أقل من دقيقة';
        if (minutes < 60) return `غير متصل منذ ${minutes} دقيقة`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `غير متصل منذ ${hours} ساعة`;
        const days = Math.floor(hours / 24);
        return `غير متصل منذ ${days} يوم`;
    }

    function openDeleteFriendModal(friendId, friendName) {
        pendingDeleteFriendId = friendId;
        document.getElementById('friend-delete-name').innerText = `إدارة الصديق: ${friendName}`;
        document.getElementById('friend-delete-modal-overlay').style.display = 'flex';
    }

    function closeDeleteFriendModal() {
        pendingDeleteFriendId = null;
        document.getElementById('friend-delete-modal-overlay').style.display = 'none';
    }

    function confirmDeleteFriend() {
        if (!pendingDeleteFriendId || !userId) return closeDeleteFriendModal();
        const friendId = pendingDeleteFriendId;
        db.ref(`${getCurrentSocialBasePath()}/friends/${friendId}`).remove();
        db.ref(`users/${friendId}/friends/${userId}`).remove();
        closeDeleteFriendModal();
    }

    function renderFriendsList() {
        const list = document.getElementById('friends-tab');
        list.innerHTML = "";

        const ids = Object.keys(friendDataCache);
        let onlineCount = 0;

        ids.forEach(friendId => {
            const f = friendDataCache[friendId];
            if (!f || !f.name) return;
            const isOnline = !!f.online;
            if (isOnline) onlineCount++;

            const item = document.createElement('div');
            item.className = 'friend-item';
            item.onclick = () => openDeleteFriendModal(friendId, f.name);

            const safeName = escapeHTML(f.name);
            const safeAvatar = escapeHTML((f.name[0] || '?'));
            const roomCode = (f.currentRoom || '').replace(/'/g, "\\'");
            const statusText = isOnline ? 'متصل' : formatOfflineDuration(f.lastSeen);
            const statusClass = isOnline ? 'online' : 'offline';
            const dotClass = isOnline ? 'online-dot' : 'offline-dot';

            const roomLabel = f.currentRoom ? `<div style="font-size:0.73rem; color:#bdbdbd; margin-top:2px;">الغرفة: ${escapeHTML(f.currentRoom)}</div>` : '';
            const joinBtn = f.currentRoom
                ? `<button style="background:var(--main-color); border:none; padding:5px; border-radius:5px; cursor:pointer;" onclick="event.stopPropagation(); joinFriendRoom('${roomCode}')">دخول</button>`
                : '';

            item.innerHTML = `<div class="friend-avatar">${safeAvatar}</div><div style="flex:1"><div>${safeName}</div>${roomLabel}<div class="friend-status ${statusClass}"><span class="${dotClass}"></span>${statusText}</div></div>${joinBtn}`;
            list.appendChild(item);
        });

        document.getElementById('friendsCount').innerText = onlineCount;
    }

    function listenToFriendProfile(friendId) {
        if (friendRefs[friendId]) return;
        const ref = db.ref(`users/${friendId}`);
        const cb = snap => {
            friendDataCache[friendId] = snap.val();
            renderFriendsList();
        };
        ref.on('value', cb);
        friendRefs[friendId] = { ref, cb };
    }

    function stopListeningToFriend(friendId) {
        const entry = friendRefs[friendId];
        if (entry) {
            entry.ref.off('value', entry.cb);
            delete friendRefs[friendId];
        }
        delete friendDataCache[friendId];
    }

    function listenToFriends() {
        const list = document.getElementById('friends-tab');
        list.innerHTML = '<div class="section-loading">جاري تحميل الأصدقاء...</div>';

        if (friendsListRef) friendsListRef.off();
        friendsListRef = db.ref(`${getCurrentSocialBasePath()}/friends`);

        friendsListRef.on('value', s => {
            const nextIds = new Set();
            s.forEach(child => nextIds.add(child.key));

            Object.keys(friendRefs).forEach(friendId => {
                if (!nextIds.has(friendId)) {
                    stopListeningToFriend(friendId);
                }
            });

            nextIds.forEach(friendId => listenToFriendProfile(friendId));
            renderFriendsList();
        });
    }

    function listenToRequests() {
        const list = document.getElementById('requests-tab');
        list.innerHTML = '<div class="section-loading">جاري تحميل الطلبات...</div>';

        if (requestsListRef) requestsListRef.off();
        requestsListRef = db.ref(`${getCurrentSocialBasePath()}/friendRequests`);

        requestsListRef.on('value', s => {
            list.innerHTML = "";
            s.forEach(child => {
                const item = document.createElement('div');
                item.className = 'friend-item';
                const fromName = escapeHTML((child.val() && child.val().fromName) || 'مستخدم');
                item.innerHTML = `<div style="flex:1">${fromName}</div><button onclick="acceptFriend('${child.key}')" style="background:#0f0; border:none; padding:5px; border-radius:5px; cursor:pointer;">قبول</button>`;
                list.appendChild(item);
            });
        });
    }

    function acceptFriend(id) {
        db.ref(`${getCurrentSocialBasePath()}/friends/${id}`).set(true);
        db.ref(`users/${id}/friends/${userId}`).set(true);
        db.ref(`${getCurrentSocialBasePath()}/friendRequests/${id}`).remove();
    }

    function toggleFriendsPanel() { document.getElementById('friendsListContainer').classList.toggle('active'); }
    function switchTab(tab) {
        document.getElementById('friends-tab').style.display = tab === 'friends' ? 'block' : 'none';
        document.getElementById('requests-tab').style.display = tab === 'requests' ? 'block' : 'none';
        document.getElementById('tab-f').classList.toggle('active', tab === 'friends');
        document.getElementById('tab-r').classList.toggle('active', tab === 'requests');
    }
    function closeReplyBox() { replyingTo = null; document.getElementById('reply-box').style.display = 'none'; }

    window.addEventListener('beforeunload', () => {
        if (!userId) return;
        if (currentRoom && currentUser) {
            setTypingState(false);
            if (disconnectLeaveRef && disconnectLeavePayload) {
                disconnectLeaveRef.set(disconnectLeavePayload);
            }
        }
    });

    setInterval(() => {
        if (Object.keys(friendDataCache).length) renderFriendsList();
    }, 30000);

    prefillLoginFields();
    document.getElementById('chat-box').addEventListener('scroll', updateLoadOlderButton);
    document.getElementById('room-password-input').addEventListener('keypress', (event) => {
        if (event.key === 'Enter') confirmRoomJoinWithPassword();
    });

    document.getElementById('messageInput').addEventListener('input', () => {
        const value = document.getElementById('messageInput').value.trim();
        if (value && pendingGifUrl) clearSelectedGif();
        if (!currentRoom) return;
        setTypingState(true);
        if (typingStopTimeout) clearTimeout(typingStopTimeout);
        typingStopTimeout = setTimeout(() => setTypingState(false), 1800);
    });

    initEmojiPicker();
    initGifPicker();
</script>
</body>
</html>

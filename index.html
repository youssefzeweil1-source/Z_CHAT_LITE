<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z_CHAT_LITE PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --main-color: #0f0; --bg-dark: #111; --panel-bg: #1a1a1a; --text-gray: #888; }
        body { background-color: var(--bg-dark); color: white; font-family: Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        
        .brand-title { color: var(--main-color); text-shadow: 0 0 15px var(--main-color); font-size: 1.8rem; margin: 10px 0; letter-spacing: 2px; text-align: center; }

        /* منطقة الدردشة */
        #chat-box { width: 95%; max-width: 700px; height: 500px; overflow-y: auto; background: var(--panel-bg); border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid #333; display: flex; flex-direction: column; }
        .message { max-width: 85%; padding: 10px 15px; margin: 8px 0; border-radius: 15px; cursor: pointer; position: relative; word-wrap: break-word; line-height: 1.4; transition: 0.2s; }
        .message:hover { filter: brightness(1.2); }
        .my-message { background-color: var(--main-color); color: #000; align-self: flex-end; border-bottom-right-radius: 0; }
        .other-message { background-color: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
        
        /* القائمة الجانبية للأصدقاء */
        #friendsListContainer { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: #151515; border-left: 2px solid var(--main-color); box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; z-index: 2000; transition: 0.4s ease-in-out; }
        #friendsListContainer.active { right: 0; }
        
        .panel-header { padding: 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .tab-container { display: flex; background: #111; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; background: none; color: var(--text-gray); border: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .tab-btn.active { color: var(--main-color); border-bottom: 2px solid var(--main-color); }

        /* البحث عن صديق */
        .search-box { padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 5px; }
        .search-box input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; font-size: 13px; }

        /* عنصر الصديق */
        .friend-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #222; transition: 0.2s; }
        .friend-item:hover { background: #1a1a1a; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 10px; }
        .online { background: #0f0; box-shadow: 0 0 8px #0f0; }
        .offline { background: #555; }
        .friend-info { flex: 1; text-align: right; }
        .friend-name { font-weight: bold; font-size: 0.95rem; }
        .friend-status-text { font-size: 0.75rem; color: var(--text-gray); }

        /* الأزرار العلوية */
        #top-buttons-container { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .top-button { background-color: var(--main-color); color: black; font-size: 20px; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 0 10px var(--main-color); }
        .badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid white; }

        /* المدخلات والردود */
        .input-group { width: 95%; max-width: 700px; display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button { background: var(--main-color); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: black; }
        
        #reply-box { width: 95%; max-width: 700px; background: #222; border-right: 4px solid var(--main-color); padding: 10px; margin-bottom: 5px; display: none; border-radius: 5px; }
        .system-message { color: var(--text-gray); font-style: italic; text-align: center; font-size: 0.8em; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="top-buttons-container">
        <button class="top-button" onclick="toggleFriendsPanel()">
            🤝 <span id="friendsCount" class="badge">0</span>
        </button>
    </div>

    <div id="friendsListContainer">
        <div class="panel-header">
            <span style="color: var(--main-color); font-weight: bold;">قائمة التواصل</span>
            <button onclick="toggleFriendsPanel()" style="background:none; color:#fff; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>

        <div class="tab-container">
            <button id="btn-f" class="tab-btn active" onclick="switchTab('friends')">الأصدقاء</button>
            <button id="btn-r" class="tab-btn" onclick="switchTab('requests')">الطلبات</button>
        </div>

        <div id="friends-tab" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
            <div class="search-box">
                <input type="text" id="searchFriendName" placeholder="ابحث عن اسم بالروم...">
                <button onclick="findAndAddFriend()" style="padding: 2px 10px; font-size: 11px;">طلب</button>
            </div>
            <div id="friendsListContent" style="overflow-y: auto; flex: 1;"></div>
        </div>

        <div id="requests-tab" style="display: none; overflow-y: auto; flex: 1;">
            <div id="requestsListContent"></div>
        </div>
    </div>

    <div class="brand-title">ℤ𝔼𝕎𝔼𝕀𝕃 ℂℍ𝔸𝕋 𝕃𝕀𝕋𝔼</div>

    <div id="login-section" style="width: 95%; max-width: 400px; text-align: center; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333;">
        <input type="text" id="roomCode" placeholder="كود الغرفة (مثال: 101)">
        <input type="text" id="username" placeholder="اسمك المستعار" style="margin-top:10px">
        <button onclick="joinRoom()" style="width: 100%; margin-top: 15px;">دخول الدردشة</button>
    </div>

    <div id="chat-box">
        <button id="loadOlderBtn" onclick="loadOlderMessages()" style="display:none; width:100%; margin-bottom:10px; background:#111; color:var(--main-color); border:1px solid #333">📜 رسائل أقدم</button>
        <div id="messages-container"></div>
    </div>

    <div id="reply-box">
        <div id="replySender" style="color: var(--main-color); font-weight: bold; font-size: 0.9em;"></div>
        <div id="replyText" style="font-size: 0.8em; opacity: 0.7;"></div>
        <button onclick="closeReplyBox()" style="padding: 2px 8px; margin-top: 5px; font-size: 10px; background:#444; color:white">إلغاء</button>
    </div>

    <div class="input-group">
        <input type="text" id="messageInput" placeholder="اكتب شيئاً..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlim9FOvDcMqTJWINoBCHk3k6DNXS-jTo",
        databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "zeweil-chat",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", currentUser = "", userId = "", replyingTo = null;
    let firstMessageKey = null;

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            userId = user.uid;
            db.ref(`users/${userId}`).update({ online: true });
            db.ref(`users/${userId}/online`).onDisconnect().set(false);
            listenToFriends();
            listenToRequests();
        } else {
            firebase.auth().signInAnonymously();
        }
    });

    function joinRoom() {
        const room = document.getElementById('roomCode').value.trim();
        const name = document.getElementById('username').value.trim();
        if (!room || !name) return alert("اكمل البيانات");

        currentRoom = room;
        currentUser = name;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loadOlderBtn').style.display = 'block';

        db.ref(`users/${userId}`).update({ name: name });
        db.ref(`rooms/${room}/users/${userId}`).set({ name, online: true });
        db.ref(`rooms/${room}/users/${userId}`).onDisconnect().remove();

        const msgRef = db.ref(`rooms/${room}/messages`);
        msgRef.limitToLast(15).on('child_added', s => {
            if (!firstMessageKey) firstMessageKey = s.key;
            addMessage(s.key, s.val(), false);
        });

        msgRef.push({ system: true, message: `✨ ${name} انضم إلينا`, timestamp: Date.now() });
    }

    function addMessage(key, data, isOld) {
        if (document.getElementById(key)) return;
        const container = document.getElementById('messages-container');
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.id = key;
        
        if (data.system) {
            div.className = 'system-message';
            div.innerText = data.message;
        } else {
            const isMine = data.userId === userId;
            div.className = `message ${isMine ? 'my-message' : 'other-message'}`;
            div.innerHTML = `<strong>${escapeHtml(data.name)}:</strong><br>${escapeHtml(data.message)}`;
            div.onclick = () => showUserActions(data.userId, data.name, key, data.message);
        }
        
        if (isOld) container.prepend(div);
        else { container.appendChild(div); box.scrollTop = box.scrollHeight; }
    }

    function showUserActions(tId, tName, mKey, mText) {
        if(tId === userId) return prepareReply(mKey, tName, mText);
        const choice = confirm(`الرد على ${tName} (موافق)\nإرسال طلب صداقة لـ ${tName} (إلغاء)`);
        if(choice) prepareReply(mKey, tName, mText);
        else sendFriendRequest(tId, tName);
    }

    function sendFriendRequest(targetId, targetName) {
        if (targetId === userId) return;
        db.ref(`users/${targetId}/friendRequests/${userId}`).set({ fromName: currentUser, timestamp: Date.now() })
        .then(() => alert(`تم إرسال الطلب لـ ${targetName}`));
    }

    function listenToFriends() {
        db.ref(`users/${userId}/friends`).on('value', s => {
            const list = document.getElementById('friendsListContent');
            list.innerHTML = "";
            let onlineCount = 0;
            s.forEach(child => {
                db.ref(`users/${child.key}`).on('value', fs => {
                    const f = fs.val();
                    if(!f) return;
                    const statusClass = f.online ? 'online' : 'offline';
                    if(f.online) onlineCount++;
                    document.getElementById('friendsCount').innerText = onlineCount;

                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `
                        <div class="status-dot ${statusClass}"></div>
                        <div class="friend-info">
                            <div class="friend-name">${f.name}</div>
                            <div class="friend-status-text">${f.online ? 'متصل الآن' : 'غير متصل'}</div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        });
    }

    function listenToRequests() {
        db.ref(`users/${userId}/friendRequests`).on('value', s => {
            const list = document.getElementById('requestsListContent');
            list.innerHTML = s.exists() ? "" : "<p style='text-align:center; padding:20px; color:#555;'>لا توجد طلبات</p>";
            s.forEach(child => {
                const req = child.val();
                const item = document.createElement('div');
                item.className = 'friend-item';
                item.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-name">${req.fromName}</div>
                        <div style="margin-top:5px">
                            <button onclick="acceptFriend('${child.key}', '${req.fromName}')" style="background:#0f0; padding:4px 10px; font-size:11px">قبول</button>
                            <button onclick="rejectFriend('${child.key}')" style="background:#f00; padding:4px 10px; font-size:11px; color:#fff">رفض</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        });
    }

    function acceptFriend(fId, fName) {
        db.ref(`users/${userId}/friends/${fId}`).set(true);
        db.ref(`users/${fId}/friends/${userId}`).set(true);
        db.ref(`users/${userId}/friendRequests/${fId}`).remove();
        alert(`أصبح ${fName} صديقك الآن`);
    }

    function rejectFriend(fId) { db.ref(`users/${userId}/friendRequests/${fId}`).remove(); }

    function findAndAddFriend() {
        const name = document.getElementById('searchFriendName').value.trim();
        if(!name || !currentRoom) return;
        db.ref(`rooms/${currentRoom}/users`).once('value', s => {
            let found = false;
            s.forEach(c => {
                if(c.val().name === name && c.key !== userId) {
                    sendFriendRequest(c.key, name);
                    found = true;
                }
            });
            if(!found) alert("لم يتم العثور عليه في هذه الغرفة");
        });
    }

    function switchTab(tab) {
        document.getElementById('friends-tab').style.display = tab === 'friends' ? 'flex' : 'none';
        document.getElementById('requests-tab').style.display = tab === 'requests' ? 'block' : 'none';
        document.getElementById('btn-f').classList.toggle('active', tab === 'friends');
        document.getElementById('btn-r').classList.toggle('active', tab === 'requests');
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input.value.trim() || !currentRoom) return;
        const msgData = { userId, name: currentUser, message: input.value.trim(), timestamp: Date.now() };
        if (replyingTo) { msgData.replyTo = replyingTo; closeReplyBox(); }
        db.ref(`rooms/${currentRoom}/messages`).push(msgData);
        input.value = "";
    }

    function prepareReply(key, name, msg) {
        replyingTo = { key, name, msg: msg.substring(0, 30) + "..." };
        document.getElementById('replySender').innerText = `الرد على ${name}`;
        document.getElementById('replyText').innerText = msg;
        document.getElementById('reply-box').style.display = 'block';
    }

    function toggleFriendsPanel() { document.getElementById('friendsListContainer').classList.toggle('active'); }
    function closeReplyBox() { replyingTo = null; document.getElementById('reply-box').style.display = 'none'; }
    function escapeHtml(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function loadOlderMessages() {
        if (!firstMessageKey) return;
        db.ref(`rooms/${currentRoom}/messages`).orderByKey().endAt(firstMessageKey).limitToLast(6).once('value', s => {
            let msgs = [];
            s.forEach(c => { if(c.key !== firstMessageKey) msgs.push({k:c.key, d:c.val()}); });
            if(msgs.length === 0) return alert("لا يوجد أقدم");
            firstMessageKey = msgs[0].k;
            msgs.reverse().forEach(m => addMessage(m.k, m.d, true));
        });
    }
</script>
</body>
</html>

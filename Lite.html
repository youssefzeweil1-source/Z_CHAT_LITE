<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℤ𝔼𝕎𝔼𝕀𝕃 ℂℍ𝔸𝕋 𝕃𝕀𝕋𝔼 - Friends Only</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --main-color: #00ff88; --bg-dark: #0a0a0a; --panel-bg: #141414; --text-gray: #aaa; --accent: #00ccff; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: var(--panel-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .brand-title { color: var(--main-color); margin: 0; font-size: 1.4rem; font-weight: bold; letter-spacing: 1px; }
        .user-actions { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; position: relative; color: white; transition: 0.2s; }
        .icon-btn:hover { color: var(--main-color); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid white; font-weight: bold; }

        /* Main Layout */
        .main-container { flex: 1; display: flex; overflow: hidden; }
        
        /* Sidebar (Friends List) */
        .sidebar { width: 100%; max-width: 350px; background: #0f0f0f; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .search-bar { padding: 15px; border-bottom: 1px solid #222; }
        .search-input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        .search-input:focus { border-color: var(--main-color); }
        
        .tabs { display: flex; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-gray); font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .tab.active { color: var(--main-color); border-bottom: 2px solid var(--main-color); background: rgba(0, 255, 136, 0.05); }

        .list-container { flex: 1; overflow-y: auto; }
        .friend-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
        .friend-item:hover { background: #1a1a1a; }
        .friend-avatar { width: 45px; height: 45px; border-radius: 50%; background: #333; margin-left: 12px; position: relative; flex-shrink: 0; overflow: hidden; }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; left: 2px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #0f0f0f; }
        .status-online { background: #00ff00; }
        .status-offline { background: #555; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-last-msg { font-size: 0.8rem; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat Window */
        .chat-window { flex: 1; background: var(--bg-dark); display: flex; flex-direction: column; border-right: 1px solid #222; }
        .chat-header { background: var(--panel-bg); padding: 12px 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .chat-header-info { flex: 1; display: flex; align-items: center; gap: 12px; }
        .chat-header-avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; overflow: hidden; }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header-name { font-weight: bold; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-color: var(--bg-dark); background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--main-color); color: #000; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #262626; color: white; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .msg-time { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; display: block; text-align: left; }
        
        .chat-input-area { background: var(--panel-bg); padding: 15px; border-top: 1px solid #222; display: none; gap: 10px; align-items: center; }
        .chat-input-area.active { display: flex; }
        .chat-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #333; background: #0a0a0a; color: white; outline: none; font-size: 0.9rem; }
        .chat-input:focus { border-color: var(--main-color); }
        .send-btn { background: var(--main-color); border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; color: black; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.05); }

        /* Notification Marquee */
        #notification-marquee { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: linear-gradient(135deg, #1a1a1a, #222); border: 1px solid var(--main-color); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; z-index: 9999; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; }
        #notification-marquee.active { top: 20px; }
        #notification-marquee img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--main-color); }
        #notification-marquee-text { flex: 1; font-size: 0.85rem; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Empty State */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-gray); text-align: center; padding: 40px; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(5px); }
        .modal-content { background: #141414; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
        .modal-btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal-btn.primary { background: var(--main-color); color: black; }
        .modal-btn.secondary { background: #222; color: white; }

        @media (max-width: 768px) {
            .sidebar { max-width: 100%; position: absolute; z-index: 100; height: 100%; transition: 0.3s; right: 0; }
            .sidebar.hidden { right: -100%; }
            .chat-window { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Notification Banner -->
    <div id="notification-marquee">
        <img id="notification-marquee-img" src="" alt="">
        <div id="notification-marquee-text">إشعار جديد</div>
    </div>

    <!-- Audio Player -->
    <audio id="online-sound-player" src="Online-sound.wav" preload="auto"></audio>

    <div class="header">
        <h1 class="brand-title">ℤ𝔼𝕎𝔼𝕀𝕃 𝕃𝕀𝕋𝔼</h1>
        <div class="user-actions">
            <button class="icon-btn" onclick="toggleSidebar()">🤝 <span id="friendsCount" class="badge">0</span></button>
            <button class="icon-btn" onclick="openSearchModal()">🔍</button>
            <button class="icon-btn" onclick="openProfile()">👤</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Chat Area -->
        <div class="chat-window">
            <div id="chat-header" class="chat-header" style="display:none;">
                <div class="chat-header-info">
                    <div class="chat-header-avatar"><img id="active-chat-avatar" src="" alt=""></div>
                    <div id="active-chat-name" class="chat-header-name">اسم الصديق</div>
                </div>
                <button class="icon-btn" onclick="closeChat()">✕</button>
            </div>
            
            <div id="messages-container" class="messages-container">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>مرحباً بك في Zeweil Lite</h3>
                    <p>اختر صديقاً من القائمة لبدء المحادثة، أو ابحث عن أشخاص جدد.</p>
                </div>
            </div>

            <div id="chat-input-area" class="chat-input-area" style="display:none;">
                <input id="chat-input" type="text" class="chat-input" placeholder="اكتب رسالة...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="بحث في الأصدقاء..." oninput="filterFriends(this.value)">
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('friends')">الأصدقاء</div>
                <div class="tab" onclick="switchTab('requests')">الطلبات</div>
            </div>
            <div id="list-container" class="list-container">
                <!-- Friends/Requests will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>البحث عن أشخاص</h3>
            <input id="global-search-input" type="text" class="search-input" placeholder="اكتب اسم المستخدم..." style="margin-bottom:15px;">
            <div id="search-results" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
            <button class="modal-btn primary" onclick="performGlobalSearch()">بحث</button>
            <button class="modal-btn secondary" onclick="closeModals()">إغلاق</button>
        </div>
    </div>

    <script>
        // Firebase Configuration (Placeholder - will be inherited from context if possible)
        // Note: Real implementation needs the specific Firebase config from the user's project
        let db, auth;
        let userId, currentUser;
        let activeFriendId = null;
        let friendDataCache = {};
        let notifications = [];

        // Initialize App
        function initApp() {
            if (typeof firebase === 'undefined') return;
            
            const firebaseConfig = {
                apiKey: "AIzaSyAlim9FOvDcMqTJWINoBCHk3k6DNXS-jTo",
                databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "zeweil-chat",
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            db = firebase.database();
            auth = firebase.auth();

            auth.onAuthStateChanged(user => {
                if (user) {
                    userId = user.uid;
                    db.ref(`users/${userId}`).once('value').then(snap => {
                        const data = snap.val();
                        currentUser = data ? data.name : 'مستخدم';
                        listenToFriends();
                        listenToRequests();
                        loadNotifications();
                    });
                } else {
                    // Redirect to login if needed, but Lite usually assumes session
                    window.location.href = 'index.html'; 
                }
            });
        }

        // Friends Logic
        let friendsList = [];
        function listenToFriends() {
            db.ref(`users/${userId}/friends`).on('value', snap => {
                const friends = snap.val() || {};
                const ids = Object.keys(friends);
                document.getElementById('friendsCount').innerText = ids.length;
                
                ids.forEach(id => {
                    db.ref(`users/${id}`).on('value', s => {
                        friendDataCache[id] = s.val();
                        renderFriendsList();
                        listenToMissedMessages(id);
                    });
                });
            });
        }

        function renderFriendsList() {
            const container = document.getElementById('list-container');
            const activeTab = document.querySelector('.tab.active').innerText;
            if (activeTab === 'الطلبات') return;
            
            container.innerHTML = '';
            
            db.ref(`users/${userId}/friends`).once('value', snap => {
                const friends = snap.val() || {};
                const friendIds = Object.keys(friends);
                
                if (friendIds.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>ليس لديك أصدقاء بعد. ابحث عن أشخاص لإضافتهم!</p></div>';
                    return;
                }

                friendIds.forEach(id => {
                    const friend = friendDataCache[id];
                    if (!friend) return;
                    
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.onclick = () => openChat(id);
                    
                    const statusClass = friend.online ? 'status-online' : 'status-offline';
                    const avatar = friend.profileImage || 'photo.png';
                    
                    item.innerHTML = `
                        <div class="friend-avatar">
                            <img src="${avatar}" alt="">
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">${friend.name}</div>
                            <div class="friend-last-msg">${friend.statusText || 'لا توجد رسائل'}</div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            });
        }

        // Chat Logic
        let chatListener = null;
        function openChat(friendId) {
            activeFriendId = friendId;
            const friend = friendDataCache[friendId];
            
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('chat-input-area').classList.add('active');
            document.getElementById('active-chat-name').innerText = friend.name;
            document.getElementById('active-chat-avatar').src = friend.profileImage || 'photo.png';
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
            
            loadMessages(friendId);
        }

        function loadMessages(friendId) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<div class="section-loading">جاري تحميل الرسائل...</div>';
            
            const chatId = userId < friendId ? `${userId}_${friendId}` : `${friendId}_${userId}`;
            
            if (chatListener) chatListener.off();
            
            chatListener = db.ref(`friendChats/${chatId}/messages`).limitToLast(50);
            chatListener.on('value', snap => {
                const msgs = snap.val() || {};
                const msgList = Object.values(msgs);
                
                if (msgList.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>لا توجد رسائل سابقة. ابدأ المحادثة الآن!</p></div>';
                } else {
                    container.innerHTML = '';
                    msgList.forEach(m => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `msg ${m.senderId === userId ? 'mine' : 'other'}`;
                        msgDiv.innerHTML = `
                            ${escapeHTML(m.text)}
                            <span class="msg-time">${new Date(m.timestamp).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                        `;
                        container.appendChild(msgDiv);
                    });
                }
                container.scrollTop = container.scrollHeight;
                markAsSeen(chatId, msgs);
            });
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeFriendId) return;
            
            const chatId = userId < activeFriendId ? `${userId}_${activeFriendId}` : `${activeFriendId}_${userId}`;
            const msg = {
                senderId: userId,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                seenBy: { [userId]: true }
            };
            
            db.ref(`friendChats/${chatId}/messages`).push(msg);
            input.value = '';
        }

        function markAsSeen(chatId, messages) {
            Object.keys(messages).forEach(key => {
                if (messages[key].senderId !== userId && (!messages[key].seenBy || !messages[key].seenBy[userId])) {
                    db.ref(`friendChats/${chatId}/messages/${key}/seenBy/${userId}`).set(true);
                }
            });
        }

        // Notifications & Sound
        function playSound() {
            const player = document.getElementById('online-sound-player');
            player.play().catch(() => {});
        }

        function showNotification(msg, friendId) {
            if (activeFriendId === friendId) return;
            
            const friend = friendDataCache[friendId] || {};
            const banner = document.getElementById('notification-marquee');
            const img = document.getElementById('notification-marquee-img');
            const text = document.getElementById('notification-marquee-text');
            
            img.src = friend.profileImage || 'photo.png';
            text.innerText = `رسالة من ${friend.name}: ${msg.text}`;
            banner.classList.add('active');
            banner.onclick = () => {
                openChat(friendId);
                banner.classList.remove('active');
            };
            
            playSound();
            setTimeout(() => banner.classList.remove('active'), 5000);
        }

        function listenToMissedMessages(friendId) {
            const chatId = userId < friendId ? `${userId}_${friendId}` : `${friendId}_${userId}`;
            db.ref(`friendChats/${chatId}/messages`).limitToLast(1).on('child_added', snap => {
                const msg = snap.val();
                if (msg && msg.senderId === friendId && (!msg.seenBy || !msg.seenBy[userId])) {
                    showNotification(msg, friendId);
                }
            });
        }

        // UI Helpers
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            // Find the correct tab element to activate
            if (type === 'friends') tabs[0].classList.add('active');
            else tabs[1].classList.add('active');
            
            if (type === 'friends') renderFriendsList();
            else renderRequestsList();
        }

        function openSearchModal() {
            document.getElementById('search-modal').style.display = 'flex';
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        function performGlobalSearch() {
            const query = document.getElementById('global-search-input').value.trim();
            if (!query) return;
            
            const results = document.getElementById('search-results');
            results.innerHTML = 'جاري البحث...';
            
            db.ref('users').orderByChild('name').startAt(query).endAt(query + '\uf8ff').limitToFirst(10).once('value').then(snap => {
                results.innerHTML = '';
                const users = snap.val() || {};
                Object.keys(users).forEach(id => {
                    if (id === userId) return;
                    const u = users[id];
                    const div = document.createElement('div');
                    div.className = 'friend-item';
                    div.innerHTML = `
                        <div class="friend-avatar"><img src="${u.profileImage || 'photo.png'}"></div>
                        <div class="friend-info"><div class="friend-name">${u.name}</div></div>
                        <button class="modal-btn primary" style="width:auto; padding:5px 10px;" onclick="sendFriendRequest('${id}')">إضافة</button>
                    `;
                    results.appendChild(div);
                });
                if (results.innerHTML === '') results.innerHTML = 'لا توجد نتائج.';
            });
        }

        function sendFriendRequest(targetId) {
            db.ref(`users/${targetId}/requests/${userId}`).set(true).then(() => {
                alert('تم إرسال طلب الصداقة');
                closeModals();
            });
        }

        function renderRequestsList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="section-loading">جاري تحميل الطلبات...</div>';
            
            db.ref(`users/${userId}/requests`).on('value', snap => {
                container.innerHTML = '';
                const reqs = snap.val() || {};
                const ids = Object.keys(reqs);
                
                if (ids.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>لا توجد طلبات صداقة حالياً.</p></div>';
                    return;
                }

                ids.forEach(id => {
                    db.ref(`users/${id}`).once('value').then(s => {
                        const u = s.val();
                        const div = document.createElement('div');
                        div.className = 'friend-item';
                        div.innerHTML = `
                            <div class="friend-avatar"><img src="${u.profileImage || 'photo.png'}"></div>
                            <div class="friend-info"><div class="friend-name">${u.name}</div></div>
                            <div style="display:flex; gap:5px;">
                                <button class="modal-btn primary" style="width:auto; padding:5px 10px;" onclick="acceptRequest('${id}')">قبول</button>
                                <button class="modal-btn secondary" style="width:auto; padding:5px 10px;" onclick="rejectRequest('${id}')">رفض</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                });
            });
        }

        function acceptRequest(targetId) {
            const updates = {};
            updates[`users/${userId}/friends/${targetId}`] = true;
            updates[`users/${targetId}/friends/${userId}`] = true;
            updates[`users/${userId}/requests/${targetId}`] = null;
            
            db.ref().update(updates).then(() => {
                alert('تم قبول الصداقة');
            });
        }

        function rejectRequest(targetId) {
            db.ref(`users/${userId}/requests/${targetId}`).remove();
        }

        function closeChat() {
            document.getElementById('chat-header').style.display = 'none';
            document.getElementById('chat-input-area').classList.remove('active');
            document.getElementById('messages-container').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Zeweil Lite</h3>
                    <p>اختر صديقاً لبدء المحادثة.</p>
                </div>
            `;
            activeFriendId = null;
            if (chatListener) chatListener.off();
        }

        // Initialize on load
        window.onload = initApp;

        // Enter to send
        document.getElementById('chat-input')?.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>

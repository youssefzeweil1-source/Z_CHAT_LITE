<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℤ𝔼𝕎𝔼𝕀𝕃 𝕃𝕀𝕋𝔼 - ℂ𝕆𝕄𝕄𝕌ℕ𝕀ℂ𝔸𝕋𝕀𝕆ℕ</title>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --main-color: #5b8cff; 
            --main-color-2:#ff7aa2; 
            --accent-3:#25c5a8; 
            --accent-4:#ffb454; 
            --bg-dark: #0f1117; 
            --panel-bg: #171b24; 
            --text-gray: #9ca3b3; 
            --card-border:#2b3342; 
            --self-1:#5b8cff; 
            --self-2:#7a73ff; 
            --self-3:#ff7aa2;
            --app-vh: 1vh;
        }
        
        body { 
            background: radial-gradient(1200px 700px at -10% -20%, rgba(255,122,162,0.18), transparent), radial-gradient(900px 700px at 110% -10%, rgba(91,140,255,0.20), transparent), radial-gradient(900px 600px at 50% 120%, rgba(37,197,168,0.14), transparent), var(--bg-dark); 
            color: #eef1f7; 
            font-family: Tahoma, sans-serif; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-title { background: linear-gradient(90deg, var(--main-color), var(--main-color-2), var(--accent-3), var(--accent-4)); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 2px 14px rgba(0,0,0,0.35); font-size: 1.8rem; margin: 10px 0; letter-spacing: 2px; text-align: center; z-index: 10; }

        /* Friends List & Navigation */
        #friendsListContainer { width: 100%; max-width: 600px; height: 100vh; background: var(--panel-bg); display: flex; flex-direction: column; z-index: 100; border-left: 1px solid var(--card-border); border-right: 1px solid var(--card-border); }
        .tabs-header { display: flex; background: #1a1a1a; border-bottom: 1px solid var(--card-border); }
        .tab-btn { flex: 1; padding: 15px; background: none; color: var(--text-gray); border: none; cursor: pointer; font-size: 0.95rem; font-weight: bold; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--main-color); border-bottom: 2px solid var(--main-color); background: rgba(91, 140, 255, 0.05); }

        .list-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-item { display: flex; align-items: center; padding: 12px; background: #1e2430; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--card-border); cursor: pointer; transition: 0.2s; }
        .friend-item:hover { border-color: var(--main-color); background: #252d3d; }
        .friend-avatar { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; margin-left: 12px; border: 2px solid var(--card-border); background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-info { flex: 1; }
        .friend-name { font-weight: bold; font-size: 1rem; color: #fff; }
        .friend-status { font-size: 0.75rem; margin-top: 4px; }
        .friend-status.online { color: #66ff66; }
        .friend-status.offline { color: #ff6666; }
        .online-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .offline-dot { width: 8px; height: 8px; background: #ff3333; border-radius: 50%; display: inline-block; margin-left: 5px; }

        /* Profile Modal */
        #profile-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        #profile-modal-card { width: min(92vw, 380px); max-height: 85vh; overflow-y: auto; background: #1a1a1a; border: 2px solid var(--main-color); border-radius: 20px; padding: 0; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .profile-cover { width: 100%; height: 120px; background: linear-gradient(45deg, #222, #333); position: relative; overflow: hidden; }
        .profile-cover img { width: 100%; height: 100%; object-fit: cover; }
        .profile-header-card { padding: 15px; margin-top: -50px; position: relative; z-index: 5; text-align: right; }
        .profile-avatar-large { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #1a1a1a; background: #222; overflow: hidden; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .profile-chip { background: #252d3d; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; border: 1px solid #34425c; color: #a8b6ce; }
        .profile-section-card { padding: 15px; border-top: 1px solid #333; }
        .profile-section-title { color: var(--main-color); font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        .profile-bio-box { background: #0a0a0a; padding: 12px; border-radius: 10px; font-size: 0.85rem; line-height: 1.6; color: #ddd; min-height: 60px; }

        /* Chat Popup */
        #friend-chat-popup { position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; display: none; flex-direction: column; }
        #friend-chat-popup.active { display: flex; }
        .chat-header { display: flex; align-items: center; padding: 15px; background: #1d2636; border-bottom: 1px solid #2f3a50; }
        .chat-header-name { flex: 1; font-weight: bold; font-size: 1.1rem; color: #fff; }
        .chat-close-btn { background: #3d485f; border: none; color: #fff; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #friend-chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0f1117; }
        .friend-chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .friend-chat-msg.mine { align-self: flex-end; background: linear-gradient(135deg, var(--self-1), var(--self-2), var(--self-3)); color: #fff; border-bottom-right-radius: 4px; }
        .friend-chat-msg.other { align-self: flex-start; background: #252f42; color: #e6ecf7; border: 1px solid #34415a; border-bottom-left-radius: 4px; }
        .msg-time { display: block; font-size: 0.65rem; margin-top: 5px; opacity: 0.7; text-align: left; }

        .chat-input-row { display: flex; gap: 10px; padding: 15px; background: #151c2a; border-top: 1px solid #263148; }
        #friend-chat-input { flex: 1; background: #0f1520; border: 1px solid #33415a; border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; font-size: 1rem; }
        #friend-chat-send-btn { background: var(--main-color); border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; color: #000; font-weight: bold; }

        /* Notification Marquee */
        #notification-marquee { position: fixed; top: 12px; left: 50%; transform: translate(-50%, -120%); width: min(94vw, 520px); z-index: 7000; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.22); background: linear-gradient(135deg, rgba(91,140,255,.96), rgba(37,197,168,.96), rgba(255,122,162,.96)); color: #081018; font-weight: bold; box-shadow: 0 16px 36px rgba(0,0,0,.42); opacity: 0; pointer-events: none; transition: 0.28s ease; overflow: hidden; direction: rtl; }
        #notification-marquee.active { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
        #notification-marquee img { width: 36px; height: 36px; object-fit: cover; border-radius: 50%; background: rgba(255,255,255,.45); flex-shrink: 0; }
        #notification-marquee-text { white-space: nowrap; flex: 1; overflow: hidden; text-overflow: ellipsis; }

        .hidden { display: none !important; }
        .section-loading { text-align: center; padding: 40px; color: var(--text-gray); }
        .friend-action-btn { border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
        .friend-action-btn.nudge { background: var(--accent-3); color: #000; }
        .friend-actions { display: flex; align-items: center; }

        #top-profile-trigger { position: absolute; top: 15px; left: 15px; display: flex; align-items: center; gap: 8px; background: var(--panel-bg); padding: 5px 12px; border-radius: 25px; border: 1px solid var(--card-border); cursor: pointer; z-index: 200; }
        #my-profile-trigger-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--main-color); display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        #my-profile-trigger-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="top-profile-trigger" onclick="openMyProfile()">
        <div id="my-profile-trigger-name">حسابي</div>
        <div id="my-profile-trigger-avatar">?</div>
    </div>

    <h1 class="brand-title">ℤ𝔼𝕎𝔼𝕀𝕃 𝕃𝕀𝕋𝔼</h1>

    <div id="friendsListContainer">
        <div class="tabs-header">
            <button id="tab-friends" class="tab-btn active" onclick="switchTab('friends')">الأصدقاء</button>
            <button id="tab-requests" class="tab-btn" onclick="switchTab('requests')">الطلبات <span id="requestsCountBadge" style="background:red; color:white; border-radius:10px; padding:2px 6px; font-size:10px; display:none;">0</span></button>
            <button id="tab-search" class="tab-btn" onclick="switchTab('search')">بحث</button>
        </div>

        <div id="search-bar" class="hidden" style="padding:15px; background:#1a1a1a;">
            <input type="text" id="user-search-input" placeholder="اكتب اسم المستخدم للبحث..." style="width:100%; padding:10px; border-radius:10px; border:1px solid #333; background:#000; color:#fff; outline:none;" onkeyup="if(event.key==='Enter')searchUsers()">
        </div>

        <div id="list-scroll" class="list-scroll">
            <div id="friends-tab"></div>
            <div id="requests-tab" class="hidden"></div>
            <div id="search-results-tab" class="hidden"></div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal-overlay" onclick="closeProfileModal()">
        <div id="profile-modal-card" onclick="event.stopPropagation()">
            <div id="profile-cover" class="profile-cover">
                <div id="profile-cover-media"></div>
            </div>
            <div class="profile-header-card">
                <div style="display:flex; align-items:flex-end;">
                    <div id="profile-avatar-wrap" class="profile-avatar-large"></div>
                    <div style="flex:1; padding-bottom:10px;">
                        <div id="profile-name" style="font-weight:bold; color:#fff; font-size:1.2rem;"></div>
                        <div id="profile-badge" style="font-size:0.8rem; color:#ffaa33; margin-top:4px;"></div>
                    </div>
                </div>
                <div class="profile-chip-row">
                    <div id="profile-joined" class="profile-chip">انضم: —</div>
                    <div id="profile-friends-count" class="profile-chip">الأصدقاء: 0</div>
                </div>
            </div>
            <div class="profile-section-card">
                <div class="profile-section-title">نبذة</div>
                <div id="profile-bio-preview" class="profile-bio-box">لا توجد نبذة.</div>
            </div>
            <div class="profile-section-card" id="profile-actions-area">
                <button id="profile-chat-btn" onclick="openChatFromProfile()" style="width:100%; padding:12px; background:var(--main-color); border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-bottom:10px;">💬 مراسلة</button>
                <button id="profile-add-btn" onclick="sendFriendRequestFromProfile()" style="width:100%; padding:12px; background:#333; color:#fff; border:none; border-radius:10px; cursor:pointer; margin-bottom:10px; display:none;">➕ إضافة صديق</button>
                <button onclick="closeProfileModal()" style="width:100%; padding:10px; background:#222; color:#888; border:none; border-radius:10px; cursor:pointer;">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Chat Popup -->
    <div id="friend-chat-popup">
        <div class="chat-header">
            <div class="chat-header-name" id="friend-chat-title">محادثة</div>
            <button class="chat-close-btn" onclick="closeFriendSimpleChat()">✕</button>
        </div>
        <div id="friend-chat-messages"></div>
        <div class="chat-input-row">
            <input id="friend-chat-input" type="text" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter')sendFriendSimpleChatMessage()">
            <button id="friend-chat-send-btn" onclick="sendFriendSimpleChatMessage()">إرسال</button>
        </div>
    </div>

    <div id="notification-marquee" onclick="openChatFromNotification()">
        <img id="notification-marquee-img" src="50.png" alt="">
        <div id="notification-marquee-text"></div>
    </div>
    <audio id="online-sound-player" src="Online-sound.wav" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlim9FOvDcMqTJWINoBCHk3k6DNXS-jTo",
            databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "zeweil-chat",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let userId = null;
        let currentUser = null;
        let friendDataCache = {};
        let friendRefs = {};
        let activeFriendChatUserId = '';
        let activeFriendChatId = '';
        let friendChatListenerRef = null;
        let friendChatListenerCb = null;
        let friendChatServerMessages = [];
        let friendChatLocalMessages = [];
        let notifications = [];
        let selectedProfileId = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                userId = user.uid;
                db.ref(`users/${userId}`).on('value', snap => {
                    const data = snap.val() || {};
                    currentUser = data.name || 'مستخدم';
                    updateMyProfileTrigger(data);
                    initApp();
                });
            } else {
                window.location.href = 'index.html';
            }
        });

        function initApp() {
            listenToFriends();
            listenToRequests();
        }

        function updateMyProfileTrigger(data) {
            document.getElementById('my-profile-trigger-name').innerText = data.name || 'حسابي';
            const avatar = document.getElementById('my-profile-trigger-avatar');
            if (data.profileImage) {
                avatar.innerHTML = `<img src="${data.profileImage}" alt="">`;
            } else {
                avatar.innerText = (data.name || '?')[0];
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('friends-tab').classList.add('hidden');
            document.getElementById('requests-tab').classList.add('hidden');
            document.getElementById('search-results-tab').classList.add('hidden');
            document.getElementById('search-bar').classList.add('hidden');

            if (tab === 'friends') document.getElementById('friends-tab').classList.remove('hidden');
            if (tab === 'requests') document.getElementById('requests-tab').classList.remove('hidden');
            if (tab === 'search') {
                document.getElementById('search-results-tab').classList.remove('hidden');
                document.getElementById('search-bar').classList.remove('hidden');
            }
        }

        function listenToFriends() {
            db.ref(`users/${userId}/friends`).on('value', snap => {
                const friends = snap.val() || {};
                const ids = Object.keys(friends);
                ids.forEach(fid => {
                    if (!friendRefs[fid]) {
                        const ref = db.ref(`users/${fid}`);
                        const cb = s => {
                            friendDataCache[fid] = { id: fid, ...s.val() };
                            renderFriendsList();
                            listenToMissedMessages(fid);
                        };
                        ref.on('value', cb);
                        friendRefs[fid] = { ref, cb };
                    }
                });
                renderFriendsList();
            });
        }

        function renderFriendsList() {
            const list = document.getElementById('friends-tab');
            list.innerHTML = '';
            const friends = Object.values(friendDataCache).sort((a,b) => (b.online?1:0) - (a.online?1:0));
            if (friends.length === 0) {
                list.innerHTML = '<div class="section-loading">لا يوجد أصدقاء بعد.</div>';
                return;
            }
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.onclick = () => openFriendProfile(f.id);
                div.innerHTML = `
                    <div class="friend-avatar">${f.profileImage ? `<img src="${f.profileImage}">` : (f.name||'?')[0]}</div>
                    <div class="friend-info">
                        <div class="friend-name">${f.name}</div>
                        <div class="friend-status ${f.online?'online':'offline'}"><span class="${f.online?'online-dot':'offline-dot'}"></span>${f.online?'متصل':'غير متصل'}</div>
                    </div>
                    <div class="friend-actions">
                        <button class="friend-action-btn nudge" onclick="event.stopPropagation(); sendNudge('${f.id}')">👆 نكز</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function listenToRequests() {
            db.ref(`users/${userId}/friendRequests`).on('value', snap => {
                const reqs = snap.val() || {};
                const list = document.getElementById('requests-tab');
                list.innerHTML = '';
                const entries = Object.entries(reqs);
                document.getElementById('requestsCountBadge').innerText = entries.length;
                document.getElementById('requestsCountBadge').style.display = entries.length > 0 ? 'inline-block' : 'none';
                
                if (entries.length === 0) {
                    list.innerHTML = '<div class="section-loading">لا توجد طلبات.</div>';
                    return;
                }
                entries.forEach(([fid, val]) => {
                    const div = document.createElement('div');
                    div.className = 'friend-item';
                    div.innerHTML = `
                        <div class="friend-avatar">?</div>
                        <div class="friend-info">
                            <div class="friend-name">${val.fromName || 'مستخدم'}</div>
                            <div class="friend-status">طلب صداقة جديد</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn" style="background:#28a745; color:#fff;" onclick="acceptFriend('${fid}')">قبول</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function acceptFriend(fid) {
            db.ref(`users/${userId}/friends/${fid}`).set(true);
            db.ref(`users/${fid}/friends/${userId}`).set(true);
            db.ref(`users/${userId}/friendRequests/${fid}`).remove();
        }

        function openFriendProfile(fid) {
            selectedProfileId = fid;
            const isMine = fid === userId;
            db.ref(`users/${fid}`).once('value').then(snap => {
                const data = snap.val() || {};
                document.getElementById('profile-name').innerText = data.name || 'مستخدم';
                document.getElementById('profile-avatar-wrap').innerHTML = data.profileImage ? `<img src="${data.profileImage}">` : (data.name||'?')[0];
                document.getElementById('profile-bio-preview').innerText = data.bio || 'لا توجد نبذة.';
                document.getElementById('profile-friends-count').innerText = `الأصدقاء: ${Object.keys(data.friends || {}).length}`;
                document.getElementById('profile-chat-btn').style.display = isMine ? 'none' : 'block';
                document.getElementById('profile-add-btn').style.display = (isMine || (data.friends && data.friends[userId])) ? 'none' : 'block';
                document.getElementById('profile-modal-overlay').style.display = 'flex';
            });
        }

        function openMyProfile() { openFriendProfile(userId); }
        function closeProfileModal() { document.getElementById('profile-modal-overlay').style.display = 'none'; }

        function openChatFromProfile() {
            if (!selectedProfileId) return;
            const fid = selectedProfileId;
            closeProfileModal();
            openFriendSimpleChat(fid);
        }

        function openFriendSimpleChat(fid) {
            activeFriendChatUserId = fid;
            activeFriendChatId = userId < fid ? `${userId}__${fid}` : `${fid}__${userId}`;
            document.getElementById('friend-chat-title').innerText = `💬 ${friendDataCache[fid]?.name || 'محادثة'}`;
            document.getElementById('friend-chat-popup').classList.add('active');
            
            if (friendChatListenerRef) friendChatListenerRef.off();
            friendChatListenerRef = db.ref(`friendChats/${activeFriendChatId}/messages`).limitToLast(50);
            friendChatListenerRef.on('value', snap => {
                const msgs = Object.values(snap.val() || {}).sort((a,b) => a.timestamp - b.timestamp);
                const box = document.getElementById('friend-chat-messages');
                box.innerHTML = msgs.map(m => `
                    <div class="friend-chat-msg ${m.senderId === userId ? 'mine' : 'other'}">
                        ${escapeHTML(m.text)}
                        <span class="msg-time">${new Date(m.timestamp).toLocaleTimeString()}</span>
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
                markSeen(activeFriendChatId, snap.val());
            });
        }

        function closeFriendSimpleChat() {
            document.getElementById('friend-chat-popup').classList.remove('active');
            if (friendChatListenerRef) friendChatListenerRef.off();
        }

        function sendFriendSimpleChatMessage() {
            const input = document.getElementById('friend-chat-input');
            const text = input.value.trim();
            if (!text || !activeFriendChatId) return;
            db.ref(`friendChats/${activeFriendChatId}/messages`).push({
                senderId: userId,
                senderName: currentUser,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                dayKey: new Date().toISOString().split('T')[0]
            });
            input.value = '';
        }

        function markSeen(chatId, msgs) {
            const updates = {};
            Object.entries(msgs || {}).forEach(([key, m]) => {
                if (m.senderId !== userId && (!m.seenBy || !m.seenBy[userId])) {
                    updates[`${key}/seenBy/${userId}`] = true;
                }
            });
            if (Object.keys(updates).length) db.ref(`friendChats/${chatId}/messages`).update(updates);
        }

        function listenToMissedMessages(fid) {
            const chatId = userId < fid ? `${userId}__${fid}` : `${fid}__${userId}`;
            db.ref(`friendChats/${chatId}/messages`).limitToLast(1).on('child_added', snap => {
                const msg = snap.val();
                if (msg.senderId !== userId && msg.timestamp > Date.now() - 5000) {
                    if (activeFriendChatUserId !== fid) {
                        showNotification(fid, msg.text);
                        document.getElementById('online-sound-player').play();
                    }
                }
            });
        }

        function showNotification(fid, text) {
            const friend = friendDataCache[fid] || {};
            const marquee = document.getElementById('notification-marquee');
            document.getElementById('notification-marquee-img').src = friend.profileImage || '50.png';
            document.getElementById('notification-marquee-text').innerText = `${friend.name}: ${text}`;
            marquee.classList.add('active');
            marquee.dataset.fid = fid;
            setTimeout(() => marquee.classList.remove('active'), 5000);
        }

        function openChatFromNotification() {
            const fid = document.getElementById('notification-marquee').dataset.fid;
            if (fid) openFriendSimpleChat(fid);
        }

        function sendNudge(fid) {
            db.ref(`users/${fid}/nudges`).push({ fromId: userId, fromName: currentUser, timestamp: firebase.database.ServerValue.TIMESTAMP });
        }

        function searchUsers() {
            const query = document.getElementById('user-search-input').value.trim();
            if (!query) return;
            const results = document.getElementById('search-results-tab');
            results.innerHTML = '<div class="section-loading">جاري البحث...</div>';
            db.ref('users').orderByChild('name').startAt(query).endAt(query + '\uf8ff').limitToFirst(10).once('value', snap => {
                const users = snap.val() || {};
                results.innerHTML = '';
                Object.entries(users).forEach(([uid, u]) => {
                    if (uid === userId) return;
                    const div = document.createElement('div');
                    div.className = 'friend-item';
                    div.onclick = () => openFriendProfile(uid);
                    div.innerHTML = `
                        <div class="friend-avatar">${u.profileImage ? `<img src="${u.profileImage}">` : (u.name||'?')[0]}</div>
                        <div class="friend-info">
                            <div class="friend-name">${u.name}</div>
                            <div class="friend-status">اضغط لعرض الملف الشخصي</div>
                        </div>
                    `;
                    results.appendChild(div);
                });
            });
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>

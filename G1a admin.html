<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | Games1area</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .admin-card { background: #111; border: 2px solid #0f0; padding: 30px; border-radius: 25px; max-width: 500px; margin: 40px auto; box-shadow: 0 0 40px rgba(0,255,0,0.15); }
        h1 { color: #0f0; font-weight: 900; margin-bottom: 5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        
        label { display: block; text-align: right; margin: 10px 5px 5px; font-weight: bold; color: #ccc; }
        select, input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1.5px solid #333; background: #000; color: #fff; font-family: 'Cairo'; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.2); }

        .btn-group { display: flex; gap: 15px; margin-top: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .btn-lock { background: #ff003c; color: white; }
        .btn-lock:hover { background: #ff2e5f; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 0, 60, 0.4); }
        
        .btn-unlock { background: #0f0; color: black; }
        .btn-unlock:hover { background: #33ff33; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 255, 0, 0.4); }

        /* ستايل زر السوفت وير */
        .danger-zone { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #222; }
        .btn-reset { background: #ffcc00; color: black; width: 100%; }
        .btn-reset:hover { background: #ffe066; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); }
        
        .btn:active { transform: scale(0.95); }
        
         .footer { margin-top: 20px; font-size: 0.7rem; color: #444; }

        .players-zone { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #222; }
        .btn-players { background:#09f; color:#fff; width:100%; }
        .btn-players:hover { background:#33adff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 153, 255, 0.3); }
        #players-list { margin-top: 12px; max-height: 320px; overflow:auto; text-align:right; }
        .player-row { background:#0c0c0c; border:1px solid #2c2c2c; border-radius:12px; padding:10px; margin-bottom:8px; }
        .player-top { display:flex; justify-content:space-between; align-items:center; gap:8px; }
        .pts-edit { display:flex; gap:8px; margin-top:8px; }
        .pts-edit input { margin:0; }
        .btn-save-pts { background:#0f0; color:#000; border:none; border-radius:10px; padding:8px 12px; font-weight:900; cursor:pointer; }

    </style>
</head>
<body>

<div class="admin-card">
    <h1>التحكم في الألعاب 🎮</h1>
    <p>تحكم في إتاحة الألعاب والرسائل المخصصة</p>
    <hr style="border: 0.5px solid #222; margin-bottom: 25px;">

    <label>اختر اللعبة المستهدفة:</label>
    <select id="game-selector">
        <option value="arena">Arena ⚡ (الموقع بالكامل)</option>
        <option value="war">Speed War ⚔️</option>
        <option value="sh">الشايب 🤡</option>
        <option value="bomb">القنبلة 💣</option>
        <option value="xo">XO ⭕</option>
        <option value="ludo">Ludo 🎲</option>
    </select>

    <label>رسالة التنبيه (تظهر عند الضغط):</label>
    <input type="text" id="admin-msg" placeholder="مثال: اللعبة تحت التحديث، انتظر قليلاً...">

    <div class="btn-group">
        <button class="btn btn-lock" onclick="controlGame(true)">
            <span>🔒</span> قفل اللعبة
        </button>
        <button class="btn btn-unlock" onclick="controlGame(false)">
            <span>🔓</span> فتح اللعبة
        </button>
    </div>

    <div class="danger-zone">
        <p style="color:#ff003c; font-weight:bold; margin-bottom:10px;">⚠️ منطقة العمليات الحساسة</p>
        <button class="btn btn-reset" onclick="resetAllRooms()">
            <span>🔄</span> سوفت وير شامل لكل الغرف
        </button>
        <p style="color:#555; font-size:0.7rem; margin-top:10px;">هذا الزر سيقوم بمسح كافة بيانات الغرف واللاعبين حالياً.</p>
    </div>

    <div class="players-zone">
        <button class="btn btn-players" onclick="loadAllPlayers()">👥 عرض جميع اللاعبين</button>
        <div id="players-list"></div>
    </div>

</div>

<div class="footer">DEVELOPED BY ZEWEIL &copy; 2026</div>

<script>
    const firebaseConfig = { 
        databaseURL: "https://zeweil-chat-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const namesDirectoryPath = "players_names";

    function controlGame(status) {
        const selectedGame = document.getElementById('game-selector').value;
        const gameNameText = document.getElementById('game-selector').options[document.getElementById('game-selector').selectedIndex].text;
        const msg = document.getElementById('admin-msg').value;

        const finalMsg = msg.trim() || "هذه اللعبة مغلقة حالياً للصيانة.";

        db.ref('games_status/' + selectedGame).set({
            maintenance: status,
            alertMessage: finalMsg
        }).then(() => {
            if(status) {
                alert(`✅ تم قفل ${gameNameText} بنجاح.\nالرسالة: ${finalMsg}`);
            } else {
                alert(`✅ تم فتح ${gameNameText} بنجاح.`);
            }
            document.getElementById('admin-msg').value = "";
        }).catch((error) => {
            alert("❌ حدث خطأ في الاتصال: " + error.message);
        });
    }


    function loadAllPlayers() {
        const list = document.getElementById('players-list');
        list.innerHTML = '<p style="color:#777">جاري التحميل...</p>';

        Promise.all([
            db.ref('users').once('value'),
            db.ref(namesDirectoryPath).once('value')
        ]).then(([usersSnap, namesSnap]) => {
            const users = usersSnap.val() || {};
            const names = namesSnap.val() || {};
            const ids = Array.from(new Set([...Object.keys(users), ...Object.keys(names)]));

            const rows = ids.map(id => {
                const u = users[id] || {};
                const name = (names[id] && names[id].name) ? names[id].name : 'بدون اسم';
                const points = u.points || 0;
                const gold = u.gold || 0;
                return `
                    <div class="player-row">
                        <div class="player-top">
                            <div><b>${name}</b> <span style="color:#666; font-size:.8rem">(${id})</span></div>
                            <div style="color:#0af">⭐ ${points} | 💰 ${gold}</div>
                        </div>
                        <div class="pts-edit">
                            <input id="pts-${id}" type="number" value="${points}" placeholder="النقاط الجديدة" />
                            <button class="btn-save-pts" onclick="savePoints('${id}')">حفظ النقاط</button>
                        </div>
                    </div>
                `;
            }).join('');

            list.innerHTML = rows || '<p style="color:#777">لا يوجد لاعبين حالياً.</p>';
        }).catch(err => {
            list.innerHTML = `<p style="color:#f66">${err.message}</p>`;
        });
    }

    function savePoints(userId) {
        const inp = document.getElementById(`pts-${userId}`);
        if (!inp) return;
        const val = Number(inp.value || 0);
        db.ref(`users/${userId}/points`).set(val).then(() => {
            alert('✅ تم تحديث النقاط');
            loadAllPlayers();
        }).catch(err => alert('❌ '+err.message));
    }

    // دالة السوفت وير الشامل لكل الغرف
    function resetAllRooms() {
        const pass = "حذف";
        const userInput = prompt("⚠️ تحذير: سيتم حذف جميع الغرف النشطة الآن!\nاكتب كلمة (حذف) للتأكيد:");

        if (userInput === pass) {
            // المسار الذي يحتوي على كافة الغرف
            db.ref('final_arena_v4').remove()
                .then(() => {
                    alert("✅ تم بنجاح تصفير كافة الغرف وإعادتها للحالة الأصلية.");
                })
                .catch((error) => {
                    alert("❌ فشل التصفير: " + error.message);
                });
        } else if (userInput !== null) {
            alert("⚠️ الكلمة غير صحيحة، لم يتم حذف أي شيء.");
        }
    }
</script>

</body>
</html>
